<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가치곡선 만져보기 (3차시)</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
      background: #fafaf8;
      color: #2c2c2a;
      line-height: 1.6;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #5f5e5a;
      margin-bottom: 16px;
    }

    .sub em {
      color: #2c2c2a;
      font-style: normal;
      font-weight: 600;
    }

    /* 범례 */
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 13px;
      color: #5f5e5a;
      margin-bottom: 6px;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 차트 래퍼 */
    .wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    /* 슬라이더 컨트롤 */
    .ctrl {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0 12px;
    }

    .ctrl label {
      font-size: 14px;
      color: #5f5e5a;
      white-space: nowrap;
    }

    .ctrl input[type=range] {
      flex: 1;
      accent-color: #3b82f6;
      height: 6px;
      cursor: pointer;
    }

    #tlab {
      font-size: 14px;
      font-weight: 600;
      color: #2c2c2a;
      min-width: 56px;
      text-align: right;
    }

    /* 값 카드 */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e6e3da;
      border-radius: 10px;
      padding: 12px;
    }

    .card .t {
      font-size: 12px;
      color: #5f5e5a;
      margin-bottom: 4px;
    }

    .card .v {
      font-size: 26px;
      font-weight: 600;
    }

    #v1 { color: #993c1d; }
    #v2 { color: #0f6e56; }

    /* 설명 텍스트 */
    .note {
      font-size: 14px;
      color: #5f5e5a;
      margin-top: 14px;
      min-height: 44px;
      line-height: 1.6;
    }

    .note em {
      color: #2c2c2a;
      font-style: normal;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>📈 가치곡선 만져보기</h1>
  <p class="sub">
    3차시 · 슬라이더로 시점을 옮기며 두 데이터의 가치가 어떻게 변하는지 보세요.
    <em>엇갈리는 지점</em>을 찾아보세요!
  </p>

  <!-- 범례 -->
  <div class="legend">
    <span>
      <span style="width:18px;height:0;border-top:3px dashed #D85A30;display:inline-block;"></span>
      시의성 데이터
    </span>
    <span>
      <span style="width:18px;height:0;border-top:3px solid #1D9E75;display:inline-block;"></span>
      축적형 데이터
    </span>
  </div>

  <!-- 차트 -->
  <div class="wrap">
    <canvas id="vc"></canvas>
  </div>

  <!-- 슬라이더 -->
  <div class="ctrl">
    <label for="t">시점</label>
    <input type="range" id="t" min="0" max="6" step="1" value="2" oninput="update()" />
    <span id="tlab">1개월</span>
  </div>

  <!-- 값 카드 -->
  <div class="cards">
    <div class="card">
      <div class="t">시의성 데이터 가치</div>
      <div class="v" id="v1">70</div>
    </div>
    <div class="card">
      <div class="t">축적형 데이터 가치</div>
      <div class="v" id="v2">35</div>
    </div>
  </div>

  <!-- 설명 -->
  <p class="note" id="note">한 달 뒤. 시의성은 빠르게 식고, 축적형은 슬슬 오릅니다.</p>

<script>
/* ── 데이터 ────────────────────────────────────────────── */
const STEPS = [
  {
    label: '생성',
    v1: 95, v2: 10,
    note: '데이터가 막 태어난 시점. 시의성 데이터는 가치가 최고조예요.'
  },
  {
    label: '수집 직후',
    v1: 90, v2: 20,
    note: '수집 직후. 시의성은 아직 높지만 이미 떨어지기 시작합니다.'
  },
  {
    label: '1개월',
    v1: 70, v2: 35,
    note: '한 달 뒤. 시의성은 빠르게 식고, 축적형은 슬슬 오릅니다.'
  },
  {
    label: '6개월',
    v1: 45, v2: 52,
    note: '반년 뒤. 두 곡선이 엇갈리는 구간 — 성격이 정반대죠!'
  },
  {
    label: '1년',
    v1: 25, v2: 68,
    note: '1년 뒤. 시의성은 거의 식었고, 축적형이 본격적으로 커집니다.'
  },
  {
    label: '2년',
    v1: 12, v2: 82,
    note: '2년 뒤. 축적형이 시의성을 크게 앞지릅니다.'
  },
  {
    label: '3년+',
    v1: 6,  v2: 95,
    note: '3년 이상. 시의성은 운영가치 거의 0, 축적형은 최고치. ※단, 맥락이 사라지면 둘 다 못 살립니다!'
  }
];

const LABELS = STEPS.map(s => s.label);
const DATA_V1 = STEPS.map(s => s.v1);
const DATA_V2 = STEPS.map(s => s.v2);

/* ── Chart.js 설정 ─────────────────────────────────────── */
const ctx = document.getElementById('vc').getContext('2d');

const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: LABELS,
    datasets: [
      {
        label: '시의성 데이터',
        data: DATA_V1,
        borderColor: '#D85A30',
        borderWidth: 2.5,
        borderDash: [6, 4],
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.4,
        fill: false,
      },
      {
        label: '축적형 데이터',
        data: DATA_V2,
        borderColor: '#1D9E75',
        borderWidth: 2.5,
        borderDash: [],
        pointRadius: 0,
        pointHoverRadius: 0,
        tension: 0.4,
        fill: false,
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: { duration: 200 },
    interaction: { mode: 'none' },
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    },
    scales: {
      x: {
        grid: {
          color: '#e8e6df',
          lineWidth: 1
        },
        ticks: {
          color: '#5f5e5a',
          font: { size: 12, family: "-apple-system, 'Apple SD Gothic Neo', '맑은 고딕', sans-serif" }
        },
        border: { color: '#ccc' }
      },
      y: {
        min: 0,
        max: 100,
        grid: {
          color: '#e8e6df',
          lineWidth: 1
        },
        ticks: {
          color: '#5f5e5a',
          stepSize: 10,
          font: { size: 11, family: "-apple-system, 'Apple SD Gothic Neo', '맑은 고딕', sans-serif" }
        },
        title: {
          display: true,
          text: '가치',
          color: '#5f5e5a',
          font: { size: 12, family: "-apple-system, 'Apple SD Gothic Neo', '맑은 고딕', sans-serif" }
        },
        border: { color: '#ccc' }
      }
    }
  },
  plugins: [{
    id: 'currentPointPlugin',
    afterDatasetsDraw(chart) {
      const idx = parseInt(document.getElementById('t').value, 10);
      const { ctx, scales: { x, y } } = chart;

      const step = STEPS[idx];
      const px = x.getPixelForValue(idx);

      // 시의성 포인트 (채운 원)
      const py1 = y.getPixelForValue(step.v1);
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py1, 7, 0, Math.PI * 2);
      ctx.strokeStyle = '#D85A30';
      ctx.lineWidth = 2;
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // 축적형 포인트 (채운 원)
      const py2 = y.getPixelForValue(step.v2);
      ctx.save();
      ctx.beginPath();
      ctx.arc(px, py2, 7, 0, Math.PI * 2);
      ctx.strokeStyle = '#1D9E75';
      ctx.lineWidth = 2;
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.stroke();
      ctx.restore();

      // 수직 안내선
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(px, y.top);
      ctx.lineTo(px, y.bottom);
      ctx.strokeStyle = 'rgba(100,100,100,0.15)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 3]);
      ctx.stroke();
      ctx.restore();
    }
  }]
});

/* ── 업데이트 함수 ──────────────────────────────────────── */
function update() {
  const idx = parseInt(document.getElementById('t').value, 10);
  const step = STEPS[idx];

  document.getElementById('tlab').textContent = step.label;
  document.getElementById('v1').textContent   = step.v1;
  document.getElementById('v2').textContent   = step.v2;
  document.getElementById('note').textContent = step.note;

  chart.update('none');
}

/* ── 초기 렌더 ─────────────────────────────────────────── */
update();
</script>
</body>
</html>
