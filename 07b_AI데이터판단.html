<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 데이터 판단</title><style>
    :root {
      --bg:#0f1720;--card:#172230;--line:#2a3a4d;--ink:#eaf1f8;
      --sub:#9fb2c6;--accent:#3d8bfd;--ok:#27ae60;--err:#e74c3c;--warn:#e67e22;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--ink);
      font-family:Pretendard,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
      min-height:100vh;padding:28px 14px;display:flex;justify-content:center;}
    .wrap{width:100%;max-width:680px;}
    .back{display:inline-block;margin-bottom:18px;font-size:13px;color:var(--sub);text-decoration:none;}
    .back:hover{color:var(--ink);}
    .tag{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);
      background:rgba(61,139,253,.12);border:1px solid rgba(61,139,253,.3);
      padding:4px 11px;border-radius:999px;margin-bottom:10px;}
    h2{font-size:22px;margin-bottom:8px;}
    .lead{color:var(--sub);font-size:14.5px;line-height:1.65;margin-bottom:22px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:18px 20px;margin-bottom:14px;}
    .card h3{font-size:15px;margin-bottom:10px;}
    .opts{display:grid;gap:8px;margin-top:10px;}
    .opts.g2{grid-template-columns:1fr 1fr;}
    .opts.g1{grid-template-columns:1fr;}
    .btn{padding:10px 14px;border-radius:10px;background:#1e3050;color:var(--ink);
      border:1px solid var(--line);font-size:14px;cursor:pointer;text-align:left;
      transition:background .15s,border-color .15s;}
    .btn:hover:not(:disabled){background:#253d63;border-color:var(--accent);}
    .btn:disabled{opacity:.55;cursor:default;}
    .btn.correct{background:rgba(39,174,96,.2)!important;border-color:var(--ok)!important;color:#6fe09f;}
    .btn.wrong{background:rgba(231,76,60,.15)!important;border-color:var(--err)!important;color:#f08080;}
    .fb{margin-top:10px;font-size:13.5px;padding:10px 14px;border-radius:10px;display:none;}
    .fb.ok{background:rgba(39,174,96,.12);color:#6fe09f;display:block;}
    .fb.err{background:rgba(231,76,60,.1);color:#f08080;display:block;}
    .progress{font-size:13px;color:var(--sub);margin-bottom:16px;}
    .score-box{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:24px;text-align:center;margin-top:18px;display:none;}
    .score-box .big{font-size:48px;margin-bottom:8px;}
    .score-box p{color:var(--sub);font-size:14px;}
    .foot{text-align:center;font-size:12px;color:#4a5a6a;margin-top:36px;
      padding-top:14px;border-top:1px solid var(--line);}
    /* drag styles */
    .drag-item{padding:10px 14px;background:#1e3050;border:1px solid var(--line);
      border-radius:10px;cursor:grab;font-size:14px;user-select:none;transition:opacity .15s;}
    .drag-item:active{cursor:grabbing;opacity:.7;}
    .drag-item.dragging{opacity:.4;}
    .drop-zone{min-height:54px;background:rgba(61,139,253,.06);border:2px dashed var(--line);
      border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px;}
    .drop-zone.over{border-color:var(--accent);background:rgba(61,139,253,.12);}
    .zone-label{font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600;}
</style></head>
<body><div class="wrap">
<a class="back" href="index.html">← 목록으로</a>
<div class="tag">🤖 7차시 분류</div><h2>AI 학습용 데이터 판단</h2><p class="lead">데이터를 드래그해서 '바로 쓸 만함 / 다듬으면 됨 / 못씀'으로 분류하세요.</p>

  <div class="card">
    <p style="font-size:13.5px;color:var(--sub);margin-bottom:14px">
      여러 데이터 샘플을 살펴보고 <b style="color:#6fe09f">바로 쓸 만함</b> / <b style="color:#fdbc40">다듬으면 됨</b> / <b style="color:#ff8c8c">못씀</b>으로 분류하세요.
    </p>
    <div id="ai-pool" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <div><div class="zone-label" style="color:#6fe09f">✅ 바로 쓸 만함</div>
           <div class="drop-zone" id="z-good" ondragover="dov(event)" ondrop="dop(event,'good')"></div></div>
      <div><div class="zone-label" style="color:#fdbc40">🔧 다듬으면 됨</div>
           <div class="drop-zone" id="z-fix" ondragover="dov(event)" ondrop="dop(event,'fix')"></div></div>
      <div><div class="zone-label" style="color:#ff8c8c">❌ 못씀</div>
           <div class="drop-zone" id="z-bad" ondragover="dov(event)" ondrop="dop(event,'bad')"></div></div>
    </div>
    <div id="ai-fb" class="fb" style="margin-top:14px"></div>
    <button class="btn" style="margin-top:12px;width:100%;background:var(--accent);color:#fff" onclick="checkAI()">정답 확인</button>
  </div>
  <script>
  var items=[
    {t:"라벨·결과코드 표준 입력된 정비일지 5,000건",z:"good",hint:"품질·라벨·목적 모두 충족"},
    {t:"담당자 칸 40% 누락, 나머지는 정상",z:"fix",hint:"전처리 후 활용 가능 (결측 보완)"},
    {t:"날짜 형식이 제각각이지만 값은 정확",z:"fix",hint:"날짜 표준화 후 활용 가능"},
    {t:"점검 결과 모두 '정상'만 기록 (편향)",z:"bad",hint:"한쪽으로 치우친 데이터 — AI가 이상 징후를 학습 불가"},
    {t:"핵심 정보가 절반 이상 오입력(값 자체 틀림)",z:"bad",hint:"핵심 정보가 틀린 데이터는 아무리 많아도 쓰레기"},
    {t:"무전기/무선기 혼용 (일관성 문제만 있음)",z:"fix",hint:"find-replace로 통일하면 활용 가능"},
    {t:"6개월치 정상 센서 데이터, 빈칸 2건",z:"good",hint:"자잘한 결측(0.1%) — AI가 보완 가능"},
    {t:"보안 데이터를 무단으로 수집한 데이터셋",z:"bad",hint:"법적·윤리적 문제 — 절대 사용 불가"},
  ];
  var pool=document.getElementById('ai-pool');
  items.forEach(function(d,i){
    var el=document.createElement('div');el.className='drag-item';el.draggable=true;
    el.textContent=d.t;el.dataset.idx=i;el.dataset.correct=d.z;
    el.addEventListener('dragstart',function(e){e.dataTransfer.setData('text',i);this.classList.add('dragging');});
    el.addEventListener('dragend',function(){this.classList.remove('dragging');});
    pool.appendChild(el);
  });
  function dov(e){e.preventDefault();e.currentTarget.classList.add('over');}
  document.querySelectorAll('.drop-zone').forEach(function(z){z.addEventListener('dragleave',function(){this.classList.remove('over');});});
  function dop(e,zone){
    e.preventDefault();
    var el=document.querySelector('[data-idx="'+e.dataTransfer.getData('text')+'"]');
    e.currentTarget.classList.remove('over');e.currentTarget.appendChild(el);
  }
  function checkAI(){
    var correct=0,total=0,hints=[];
    ['good','fix','bad'].forEach(function(z){
      document.getElementById('z-'+z).querySelectorAll('.drag-item').forEach(function(el){
        total++;
        if(el.dataset.correct===z){correct++;el.style.borderColor='var(--ok)';}
        else{el.style.borderColor='var(--err)';hints.push('• '+el.textContent+' → '+items[parseInt(el.dataset.idx)].hint);}
      });
    });
    var fb=document.getElementById('ai-fb');
    fb.textContent=correct+'/'+total+'개 정답!'+(correct===items.length?' 🎉':'');
    fb.className='fb '+(correct===items.length?'ok':'err');
    if(hints.length) fb.textContent+='
'+hints.join('
');
  }
  </script>

<div class="foot">데이터 관리자 기본·실무 교육 · 7차시</div>
</div></body></html>
