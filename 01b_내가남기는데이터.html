<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실습 · 내가 남기는 데이터는?</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: rgb(12, 18, 26);
      color: rgb(202, 222, 237);
      font-family: Pretendard, "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 26px 14px 60px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
    }

    /* 태그 뱃지 */
    .tag {
      display: inline-block;
      background-color: rgba(2, 69, 167, 0.12);
      border: 1px solid rgba(2, 66, 159, 0.35);
      color: rgb(69, 164, 253);
      font-size: 13px;
      font-weight: 700;
      border-radius: 999px;
      padding: 5px 12px;
      margin-bottom: 12px;
    }

    /* 제목 */
    h1 {
      font-size: 24px;
      font-weight: 700;
      color: rgb(202, 222, 237);
      margin-bottom: 6px;
      line-height: 1.35;
    }

    /* 설명 텍스트 */
    .lead {
      font-size: 15px;
      color: rgb(156, 178, 196);
      line-height: 24px;
      margin-bottom: 18px;
    }
    .lead b {
      color: rgb(202, 222, 237);
      font-weight: 700;
    }

    /* 섹션 레이블 */
    .sec {
      font-size: 13.5px;
      font-weight: 700;
      color: rgb(156, 178, 196);
      margin-top: 18px;
      margin-bottom: 10px;
    }

    /* 체크박스 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    /* 체크박스 라벨 */
    .chk {
      display: flex;
      align-items: center;
      gap: 10px;
      background-color: rgb(18, 27, 38);
      border: 1px solid rgb(77, 107, 142);
      border-radius: 12px;
      padding: 13px 14px;
      cursor: pointer;
      font-size: 15px;
      color: rgb(202, 222, 237);
      transition: background-color 0.15s, border-color 0.15s;
      user-select: none;
    }

    .chk:hover {
      border-color: rgb(100, 140, 180);
    }

    .chk input[type="checkbox"] {
      width: 19px;
      height: 19px;
      accent-color: rgb(61, 139, 253);
      cursor: pointer;
      flex-shrink: 0;
    }

    /* 체크된 상태 */
    .chk:has(input:checked) {
      background-color: rgb(18, 42, 25);
      border-color: rgb(33, 147, 81);
    }

    /* 추가 입력 행 */
    .addrow {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .addrow input[type="text"] {
      flex: 1;
      background-color: rgb(18, 27, 38);
      border: 1px solid rgb(77, 107, 142);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      color: rgb(202, 222, 237);
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .addrow input[type="text"]::placeholder {
      color: rgb(90, 120, 150);
    }

    .addrow input[type="text"]:focus {
      border-color: rgb(61, 139, 253);
    }

    .addrow button {
      background-color: rgb(23, 34, 46);
      border: 1px solid rgb(77, 107, 142);
      border-radius: 12px;
      padding: 0 18px;
      font-size: 15px;
      font-weight: 600;
      color: rgb(202, 222, 237);
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      transition: background-color 0.15s;
    }

    .addrow button:hover {
      background-color: rgb(30, 44, 60);
    }

    /* 내가 추가한 항목 */
    .mine {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .mine .chk {
      padding: 10px 14px;
      font-size: 14px;
    }

    /* 카운트바 / 버튼 영역 */
    .countbar {
      margin-top: 22px;
      text-align: center;
      font-size: 16px;
      color: rgb(202, 222, 237);
    }

    .countbar button {
      display: inline-block;
      background-color: rgb(2, 69, 167);
      border: none;
      border-radius: 12px;
      padding: 13px 26px;
      font-size: 16px;
      font-weight: 800;
      color: rgb(215, 212, 207);
      cursor: pointer;
      font-family: inherit;
      min-width: 270px;
      transition: background-color 0.15s;
    }

    .countbar button:hover {
      background-color: rgb(3, 84, 200);
    }

    /* 결과 펀치 카드 */
    .punch {
      display: none;
      border: 1px solid rgb(2, 66, 159);
      border-radius: 16px;
      padding: 22px;
      margin-top: 20px;
      text-align: center;
    }

    .punch.show {
      display: block;
    }

    .big {
      font-size: 40px;
      font-weight: 800;
      color: rgb(71, 213, 131);
      text-align: center;
      margin-bottom: 10px;
    }

    .punch p {
      font-size: 16px;
      color: rgb(192, 214, 232);
      line-height: 1.6;
      text-align: center;
      margin-bottom: 6px;
    }

    .punch p:last-child {
      margin-bottom: 0;
      color: rgb(156, 178, 196);
      font-size: 14.5px;
    }

    .punch p b {
      color: rgb(202, 222, 237);
      font-weight: 700;
    }

    /* 푸터 */
    .foot {
      color: rgb(156, 178, 196);
      font-size: 13px;
      text-align: center;
      margin-top: 18px;
    }

    /* 반응형 */
    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 400px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="tag">✍️ 혼자 해보기</span>
    <h1>내가 하루에 남기는 데이터는?</h1>
    <p class="lead">
      업무 중에 여러분이 <b>기록하거나 정보를 남기는 것</b>을 골라보세요.
      목록에 없으면 <b>아래 칸에 직접</b> 추가하면 됩니다.
    </p>

    <div class="sec">▸ 해당하는 것 모두 체크</div>

    <div class="grid" id="grid">
      <label class="chk">
        <input type="checkbox" />
        <span>정비일지 입력</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>보고 메모 작성</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>점검 사진 촬영</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>메신저로 상황 보고</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>점검표 체크</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>장비 상태 기록</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>근무일지 작성</span>
      </label>
      <label class="chk">
        <input type="checkbox" />
        <span>교신 내용 기록</span>
      </label>
    </div>

    <div class="sec">▸ 목록에 없는 내 것 추가</div>

    <div class="addrow">
      <input type="text" id="addInput" placeholder="예) 교대 인수인계 기록…" />
      <button id="addBtn">추가</button>
    </div>

    <div class="mine" id="mine"></div>

    <div class="countbar">
      <button id="countBtn">다 골랐어요 → 몇 개인지 보기</button>
    </div>

    <div class="punch" id="punch">
      <div class="big" id="num">0개</div>
      <p>방금 고른 이 <b id="num2">0개</b>가 — <b>전부 여러분이 매일 만드는 데이터</b>입니다.</p>
      <p>"나는 데이터랑 별 상관없다" 싶었어도, 사실은 하루에도 수십 번 데이터를 만드는 사람이었던 거죠.</p>
    </div>

    <div class="foot">데이터 관리자 기본·실무 교육 · 1차시</div>
  </div>

  <script>
    const countBtn = document.getElementById('countBtn');
    const addBtn   = document.getElementById('addBtn');
    const addInput = document.getElementById('addInput');
    const mine     = document.getElementById('mine');
    const punch    = document.getElementById('punch');
    const numEl    = document.getElementById('num');
    const num2El   = document.getElementById('num2');

    // 체크 개수 계산
    function countChecked() {
      return document.querySelectorAll('.chk input:checked').length;
    }

    // 결과 보기 버튼
    countBtn.addEventListener('click', function () {
      const n = countChecked();
      const label = n + '개';
      numEl.textContent  = label;
      num2El.textContent = label;
      punch.classList.add('show');
      punch.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });

    // 항목 추가 버튼
    addBtn.addEventListener('click', function () {
      const val = addInput.value.trim();
      if (!val) return;

      const label = document.createElement('label');
      label.className = 'chk';
      label.innerHTML = '<input type="checkbox" /><span>' + val + '</span>';
      mine.appendChild(label);
      addInput.value = '';
      addInput.focus();
    });

    // Enter 키로도 추가
    addInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addBtn.click();
    });
  </script>
</body>
</html>
