<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오너 퀴즈</title>
  <style>
    :root {
      --bg: #0f1720; --card: #172230; --card2: #1a2a3a;
      --line: #2a3a4d; --ink: #eaf1f8; --sub: #9fb2c6;
      --accent: #3d8bfd; --ok: #2ecc71; --warn: #e67e22; --err: #e74c3c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--ink);
      font-family: Pretendard, "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
      min-height: 100vh; padding: 28px 14px;
      display: flex; justify-content: center;
    }
    .wrap { width: 100%; max-width: 680px; }
    .back { display: inline-block; margin-bottom: 18px; font-size: 13px;
            color: var(--sub); text-decoration: none; }
    .back:hover { color: var(--ink); }
    .tag { display: inline-block; font-size: 12px; font-weight: 700;
           color: var(--accent); background: rgba(61,139,253,0.12);
           border: 1px solid rgba(61,139,253,0.3); padding: 4px 11px;
           border-radius: 999px; margin-bottom: 10px; }
    h2 { font-size: 22px; margin-bottom: 6px; }
    .lead { color: var(--sub); font-size: 14.5px; line-height: 1.65;
            margin-bottom: 24px; }
    .card { background: var(--card); border: 1px solid var(--line);
            border-radius: 14px; padding: 18px 20px; margin-bottom: 14px; }
    .card h3 { font-size: 15px; color: var(--ink); margin-bottom: 8px; }
    .card p { font-size: 14px; color: var(--sub); line-height: 1.6; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 10px;
           background: var(--accent); color: #fff; border: none;
           font-size: 14px; cursor: pointer; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-ok { background: #1a6e3e; color: #a8f0c6; }
    .btn-err { background: #5e1a1a; color: #f0a8a8; }
    .result { margin-top: 10px; font-size: 14px; padding: 10px 14px;
              border-radius: 10px; display: none; }
    .result.ok { background: rgba(46,204,113,0.12); color: #2ecc71; display: block; }
    .result.err { background: rgba(231,76,60,0.12); color: #e74c3c; display: block; }
    .foot { text-align: center; font-size: 12px; color: #4a5a6a; margin-top: 36px; padding-top: 14px;
            border-top: 1px solid var(--line); }

  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 목록으로</a>
  <div class="tag">🧩 1차시 퀴즈</div>
  <h2>이 중 데이터인 것은?</h2>
  <p class="lead">직관적으로 골라보세요. 정답이 생각보다 놀라울 수 있습니다.</p>

  <div class="card" id="q1">
    <h3>Q1. 아래 중 '데이터'가 아닌 것은?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
      <button class="btn" onclick="ans(this,'wrong','모두 데이터입니다 — 기록된 것은 전부 데이터.')">① 정비일지 표</button>
      <button class="btn" onclick="ans(this,'wrong','맞아요. 사진도 데이터.')">② 점검 사진</button>
      <button class="btn" onclick="ans(this,'wrong','녹음도 기록입니다.')">③ 무전 교신 녹음</button>
      <button class="btn" onclick="ans(this,'wrong','수기 메모도 데이터.')">④ 손으로 쓴 메모</button>
      <button class="btn" onclick="ans(this,'wrong','CCTV 영상도 데이터.')">⑤ CCTV 영상</button>
      <button class="btn" onclick="ans(this,'correct','정답! 머릿속 노하우는 아직 데이터가 아닙니다. 적는 순간 데이터가 됩니다.')">⑥ 머릿속 노하우</button>
    </div>
    <div class="result"></div>
  </div>

  <div class="card" id="q2">
    <h3>Q2. "데이터 = ?" 빈칸에 들어갈 말은?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
      <button class="btn" onclick="ans(this,'wrong','숫자만이 아닙니다. 사진·음성도 데이터.')">숫자로 된 것</button>
      <button class="btn" onclick="ans(this,'correct','정답! 관찰·측정·기록으로 남긴 모든 것이 데이터입니다.')">관찰·측정·기록으로 남긴 것</button>
      <button class="btn" onclick="ans(this,'wrong','디지털 형식이 아니어도 됩니다.')">컴퓨터에 저장된 것</button>
      <button class="btn" onclick="ans(this,'wrong','완벽하지 않아도 괜찮습니다.')">완벽하게 정제된 것</button>
    </div>
    <div class="result"></div>
  </div>

  <div class="card" id="q3">
    <h3>Q3. 데이터 거버넌스란?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
      <button class="btn" onclick="ans(this,'wrong','거버넌스는 기술 솔루션이 아닙니다.')">특정 AI 소프트웨어</button>
      <button class="btn" onclick="ans(this,'correct','정답! 데이터 수집~폐기까지 품질·보안·가용성을 보장하는 조직적 체계·규칙·약속.')">데이터 관리 체계·규칙·약속</button>
      <button class="btn" onclick="ans(this,'wrong','데이터 저장 공간이 아닙니다.')">클라우드 저장소</button>
      <button class="btn" onclick="ans(this,'wrong','담당자의 개인 기술이 아닙니다.')">담당자의 개인 역량</button>
    </div>
    <div class="result"></div>
  </div>

  <div class="card" id="q4">
    <h3>Q4. AI 시대에 데이터 관리자가 중요한 이유는?</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px">
      <button class="btn" onclick="ans(this,'wrong','AI가 처음 만드는 것이 아니라 여러분이 만든 데이터를 AI가 씁니다.')">AI가 스스로 데이터를 만들기 때문</button>
      <button class="btn" onclick="ans(this,'correct','정답! 현장에서 기록하는 사람이 AI의 출발점. Garbage In, Garbage Out.')">현장 기록이 AI 학습의 출발점이기 때문</button>
      <button class="btn" onclick="ans(this,'wrong','AI는 정형 데이터뿐 아니라 비정형도 처리합니다.')">AI는 정형 데이터만 다루기 때문</button>
      <button class="btn" onclick="ans(this,'wrong','관리자는 직접 모델을 만들 필요 없습니다.')">AI 모델을 직접 만들어야 하기 때문</button>
    </div>
    <div class="result"></div>
  </div>

<script>
function ans(btn, type, msg) {
  var card = btn.parentElement.parentElement;
  card.querySelectorAll('.btn').forEach(function(b){ b.disabled=true; b.style.opacity='0.5'; });
  btn.style.opacity='1';
  var r = card.querySelector('.result');
  r.textContent = (type==='correct' ? '✅ ' : '❌ ') + msg;
  r.className = 'result ' + (type==='correct' ? 'ok' : 'err');
}
</script>

  <div class="foot">데이터 관리자 기본·실무 교육 · 1차시</div>
</div>
<script>
function showResult(el, correct, msg) {
  var r = el.parentElement.querySelector('.result');
  if (!r) { r = document.createElement('div'); r.className='result'; el.parentElement.appendChild(r); }
  r.textContent = correct ? '✅ ' + msg : '❌ ' + msg;
  r.className = 'result ' + (correct ? 'ok' : 'err');
}
</script>
</body>
</html>
