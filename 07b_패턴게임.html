<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패턴 맞히기 · AI처럼 배워보기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{--bg:#0d1430;--panel:#172150;--ink:#eaf1ff;--sub:#9fb0e0;--line:#2a3568;--ok:#2ee6a6;--no:#ff6b7a;--accent:#7c9bff;}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#1c2a63,#0a0f24 70%);
    color:var(--ink);font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    display:flex;justify-content:center;padding:18px 14px 40px}
  .wrap{width:100%;max-width:600px}
  .top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .top h1{font-size:20px;margin-right:auto}
  .pill{background:#1b2550;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700}
  .lead{font-size:13.5px;color:var(--sub);line-height:1.55;margin-bottom:12px}
  .lead b{color:#fff}
  .phase{font-size:13px;font-weight:800;color:var(--ok);margin-bottom:10px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
  .ex{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:12px 6px;text-align:center;min-height:104px;display:flex;flex-direction:column;justify-content:center}
  .glyph{line-height:1}
  .lab{margin-top:6px;font-size:13px;font-weight:800}
  .lab.p{color:var(--ok)} .lab.f{color:var(--no)}
  .testcard{background:var(--panel);border:2px solid var(--line);border-radius:18px;padding:24px;text-align:center;margin-bottom:14px;min-height:150px;display:flex;align-items:center;justify-content:center}
  .btns{display:flex;gap:12px;justify-content:center}
  .btns button{flex:1;max-width:170px;border:2px solid;border-radius:14px;padding:14px;font-size:18px;font-weight:800;cursor:pointer;background:#141d3e;font-family:inherit}
  .bp{border-color:var(--ok);color:var(--ok)} .bf{border-color:var(--no);color:var(--no)}
  .btns button:active{transform:scale(.96)}
  .fb{text-align:center;font-size:14px;font-weight:700;min-height:22px;margin-top:10px}
  .fb.ok{color:var(--ok)} .fb.no{color:var(--no)}
  .start{display:block;margin:6px auto 0;background:linear-gradient(90deg,#7c9bff,#2ee6a6);color:#06122a;font-weight:800;
    font-size:16px;border:none;border-radius:12px;padding:13px 30px;cursor:pointer}
  .result{background:linear-gradient(180deg,#15306a,#0e1f4a);border:1px solid var(--accent);border-radius:16px;padding:22px;text-align:center}
  .result .acc{font-size:46px;font-weight:900;color:var(--ok);margin:6px 0}
  .result p{font-size:14px;color:#dde7ff;line-height:1.6;margin:6px 0}
  .result .rule{background:#101a3e;border:1px solid var(--line);border-radius:12px;padding:12px;margin:10px 0;font-size:14px}
  .rrow{display:flex;gap:10px;justify-content:center;margin-top:8px}
  .rrow button{background:#1b2550;border:1px solid var(--line);color:var(--ink);border-radius:11px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:14px}
  .lvbar{display:flex;gap:8px;justify-content:center;margin-top:16px}
  .lvbar button{flex:1;max-width:130px;background:#141d3e;border:2px solid var(--line);color:var(--sub);border-radius:12px;padding:10px;cursor:pointer;font-weight:800;font-size:13.5px}
  .lvbar button.on{border-color:var(--accent);color:#fff;background:#22307a}
  .hide{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🤖 패턴 맞히기</h1>
    <span class="pill">레벨 <b id="lv">1</b>/4 · 규칙 <b id="nr">1</b>개</span>
  </div>
  <p class="lead">여러분이 <b>AI(모델)</b>가 되어, 예시로 <b>패턴을 학습</b>하고 새 문제로 <b>시험</b>을 봅니다. 레벨이 오를수록 규칙이 늘어나요.</p>

  <div id="learn">
    <div class="phase" id="learnPhase"></div>
    <div class="grid" id="learnGrid"></div>
    <button class="start" id="toTest">규칙 찾았어요 → 시험 보기 ▶</button>
  </div>

  <div id="test" class="hide">
    <div class="phase">📝 시험 — 이건 통과(○)일까요? <span id="tprog"></span></div>
    <div class="testcard" id="testCard"><div class="glyph" id="tg"></div></div>
    <div class="btns">
      <button class="bf" id="bf">✗ 탈락</button>
      <button class="bp" id="bp">○ 통과</button>
    </div>
    <div class="fb" id="fb"></div>
  </div>

  <div id="resultBox" class="hide">
    <div class="result">
      <div class="phase" style="color:var(--accent)">📊 결과 — 여러분(모델)의 정확도</div>
      <div class="acc" id="acc">0%</div>
      <div class="rule" id="ruleBox"></div>
      <p id="lesson"></p>
      <div class="rrow">
        <button id="retry">이 레벨 다시</button>
        <button id="nextLv">다음 레벨 ▶</button>
      </div>
    </div>
  </div>

  <div class="lvbar" id="lvbar">
    <button data-l="0">레벨 1 · 규칙 1개</button>
    <button data-l="1">레벨 2 · 규칙 2개</button>
    <button data-l="2">레벨 3 · 규칙 3개</button>
    <button data-l="3">레벨 4 · 로봇 분류</button>
  </div>
</div>

<script>
(function(){
  const COLORS = {blue:'#5b8cff', red:'#ff6b7a'};

  function glyph(it){
    if(it.robot) return robotSVG(it);
    const ch = it.shape==='star' ? '★' : '●';
    const sz = it.size==='big' ? 64 : 38;
    return `<span style="color:${COLORS[it.color]};font-size:${sz}px">${ch}</span>`;
  }

  const RULES = [
    {nr:1, txt:"파란색이면 통과",                              pass:it=>it.color==='blue'},
    {nr:2, txt:"파란색 + 별(★)이면 통과",                     pass:it=>it.color==='blue'&&it.shape==='star'},
    {nr:3, txt:"파란색 + 별(★) + 큰 것이면 통과",             pass:it=>it.color==='blue'&&it.shape==='star'&&it.size==='big'},
    {nr:2, txt:"둥근 눈 + 뿔 없음이면 A형(○) — 색·안테나·입은 무관!", pass:it=>it.eyes==='round'&&!it.horns},
  ];

  function robotSVG(it){
    const eyes = it.eyes==='round'
      ? '<circle cx="27" cy="37" r="5" fill="#0d1430"/><circle cx="45" cy="37" r="5" fill="#0d1430"/>'
      : '<polygon points="22,34 32,34 27,42" fill="#0d1430"/><polygon points="40,34 50,34 45,42" fill="#0d1430"/>';
    const horns = it.horns
      ? '<polygon points="17,15 25,15 21,4" fill="#cfd8ff"/><polygon points="47,15 55,15 51,4" fill="#cfd8ff"/>'
      : '';
    const ant = it.antenna
      ? '<line x1="36" y1="15" x2="36" y2="5" stroke="#cfd8ff" stroke-width="2"/><circle cx="36" cy="4" r="3" fill="#ffd24a"/>'
      : '';
    const mouth = it.mouth==='grid'
      ? '<rect x="25" y="50" width="22" height="7" rx="2" fill="none" stroke="#0d1430" stroke-width="1.6"/><line x1="32.3" y1="50" x2="32.3" y2="57" stroke="#0d1430"/><line x1="39.6" y1="50" x2="39.6" y2="57" stroke="#0d1430"/>'
      : '<line x1="27" y1="53.5" x2="45" y2="53.5" stroke="#0d1430" stroke-width="2.5"/>';
    return `<svg viewBox="0 0 72 72" width="76" height="76">${horns}${ant}<rect x="15" y="15" width="42" height="44" rx="11" fill="${it.color}" stroke="#cfd8ff" stroke-width="2"/>${eyes}${mouth}</svg>`;
  }

  function R(eyes, horns, color, antenna, mouth, extra){
    return Object.assign({robot:true, eyes, horns, color, antenna, mouth}, extra||{});
  }
  function I(color, shape, size){ return {color, shape, size}; }

  const LEARN = [
    [I('blue','star','big'),  I('blue','circle','small'), I('red','star','big'),
     I('blue','circle','big'),I('red','circle','small'),  I('red','star','small')],

    [I('blue','star','big'),  I('blue','circle','big'),   I('red','star','big'),
     I('blue','star','small'),I('red','circle','small'),  I('blue','circle','small')],

    [I('blue','star','big'),  I('blue','star','small'),   I('blue','circle','big'),
     I('red','star','big'),   I('blue','star','big'),     I('red','circle','small')],
  ];

  const TEST = [
    [I('blue','star','small'), I('red','circle','big'),  I('blue','circle','big'),
     I('red','star','small'),  I('blue','star','big'),   I('red','circle','small')],

    [I('blue','star','small'), I('blue','circle','big'), I('red','star','small'),
     I('blue','star','big'),   I('red','circle','big'),  I('blue','circle','small')],

    [I('blue','star','big'),   I('blue','star','small'), I('blue','circle','big'),
     I('red','star','big'),    I('blue','star','big'),   I('blue','circle','small')],
  ];

  // 레벨4 로봇: 색·안테나·입은 제각각(함정), 정답은 눈·뿔로만 결정
  LEARN.push([
    R('round',false,'#5b8cff',false,'line'),
    R('round',false,'#ff8d6b',true, 'grid'),
    R('sharp',true, '#6bd1a0',false,'line'),
    R('sharp',true, '#5b8cff',true, 'grid'),
    R('round',false,'#c08cff',true, 'line'),
    R('sharp',true, '#ffd24a',false,'grid'),
  ]);
  TEST.push([
    R('round',false,'#6bd1a0',true, 'grid'),
    R('sharp',true, '#c08cff',false,'line'),
    R('round',false,'#ffd24a',false,'line'),
    R('sharp',true, '#5b8cff',true, 'grid'),
    R('round',false,'#ff8d6b',false,'grid'),
    R('round',true, '#5b8cff',false,'line',{trap:true}),
  ]);

  const $ = id => document.getElementById(id);
  let level=0, ti=0, score=0, busy=false;

  function startLevel(){
    $('lv').textContent = level+1;
    $('nr').textContent = RULES[level].nr;
    document.querySelectorAll('#lvbar button').forEach(b => b.classList.toggle('on', +b.dataset.l===level));
    $('learnPhase').textContent = `📚 학습 — 예시에서 '통과(○)' 규칙(${RULES[level].nr}개)을 찾아보세요`;
    const lg = $('learnGrid');
    lg.innerHTML = '';
    LEARN[level].forEach(it=>{
      const p = RULES[level].pass(it);
      const d = document.createElement('div');
      d.className = 'ex';
      d.innerHTML = `<div class="glyph">${glyph(it)}</div><div class="lab ${p?'p':'f'}">${p?'○ 통과':'✗ 탈락'}</div>`;
      lg.appendChild(d);
    });
    $('learn').classList.remove('hide');
    $('test').classList.add('hide');
    $('resultBox').classList.add('hide');
  }

  function showTest(){
    busy = false;
    const it = TEST[level][ti];
    $('tg').innerHTML = glyph(it);
    $('tprog').textContent = `(${ti+1}/${TEST[level].length})`;
    $('fb').textContent = '';
  }

  function answer(userPass){
    if(busy) return;
    busy = true;
    const it = TEST[level][ti];
    if(it.trap){
      score++;
      $('fb').className = 'fb ok';
      $('fb').innerHTML = '🤔 헷갈리죠? <b>둥근 눈인데 뿔이 있어요</b> — 학습한 두 특징이 충돌하는 새 케이스입니다.';
      setTimeout(()=>{ ti++; if(ti<TEST[level].length) showTest(); else finish(); }, 1500);
      return;
    }
    const ok = (userPass === RULES[level].pass(it));
    if(ok) score++;
    $('fb').className = 'fb ' + (ok?'ok':'no');
    $('fb').textContent = ok ? '정답!' : `아쉬워요 — 정답은 ${RULES[level].pass(it)?'○ 통과':'✗ 탈락'}`;
    setTimeout(()=>{ ti++; if(ti<TEST[level].length) showTest(); else finish(); }, 650);
  }

  function finish(){
    $('test').classList.add('hide');
    $('resultBox').classList.remove('hide');
    const tot = TEST[level].length;
    const pct = Math.round(score/tot*100);
    $('acc').textContent = pct + '%';
    $('ruleBox').innerHTML = `🔑 숨은 규칙(${RULES[level].nr}개): <b>${RULES[level].txt}</b>`;
    $('lesson').innerHTML = level===3
      ? '핵심 특징(<b>눈·뿔</b>)을 잘 찾으셨어요! 색·안테나·입은 <b>함정(무관한 특징)</b>이었죠 — AI도 엉뚱한 특징에 휘둘리면 편향이 생깁니다. 그리고 마지막 \'둥근 눈인데 뿔\' 같은 <b>본 적 없는 조합</b>이 바로 AI가 오분류하기 쉬운 지점이에요. 잘하셨어요!'
      : pct===100
        ? '완벽! 적은 예시로 규칙을 정확히 잡으셨어요. AI도 이렇게 데이터로 규칙을 배웁니다.'
        : '괜찮아요. 예시가 더 많고 다양했다면 더 정확했을 거예요 — <b>좋은 데이터가 많을수록 AI도 정확</b>해집니다.';
    $('nextLv').style.display = level<3 ? '' : 'none';
  }

  function go(l){
    level = l; ti = 0; score = 0;
    startLevel();
  }

  $('toTest').onclick = ()=>{ ti=0; score=0; $('learn').classList.add('hide'); $('test').classList.remove('hide'); showTest(); };
  $('bp').onclick = ()=>answer(true);
  $('bf').onclick = ()=>answer(false);
  $('retry').onclick = ()=>go(level);
  $('nextLv').onclick = ()=>go(Math.min(3, level+1));
  document.querySelectorAll('#lvbar button').forEach(b=>b.addEventListener('click',()=>go(+b.dataset.l)));

  go(0);
})();
</script>
</body>
</html>
