<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>생명주기 순서 맞히기 (3차시)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
      background: #fafaf8;
      color: #2c2c2a;
      line-height: 1.6;
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 14px;
      color: #5f5e5a;
      margin-bottom: 18px;
    }

    .sub em {
      color: #2c2c2a;
      font-style: normal;
      font-weight: 600;
    }

    .label {
      font-size: 13px;
      color: #5f5e5a;
      margin: 16px 0 8px;
    }

    /* 단어 풀 영역 */
    .pool {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 52px;
      background: #f1efe8;
      border-radius: 10px;
      padding: 12px;
    }

    /* 순서 배치 영역 */
    .seq {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 52px;
      background: #eeedfe;
      border: 1px dashed #afa9ec;
      border-radius: 10px;
      padding: 12px;
    }

    /* 칩 공통 */
    .chip {
      padding: 10px 16px;
      border: 1px solid #cfc9bc;
      background: #fff;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .chip:hover { background: #f1efe8; }

    .chip .n {
      color: #534ab7;
      font-weight: 600;
      margin-right: 6px;
    }

    /* 정답/오답 chip 색상 */
    .chip.correct {
      background: #e1f5ee;
      border-color: #4caf8a;
      color: #085041;
    }

    .chip.correct .n { color: #085041; }

    .chip.wrong {
      background: #fdecea;
      border-color: #e07070;
      color: #7a2020;
    }

    .chip.wrong .n { color: #7a2020; }

    /* 버튼 */
    .btns {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btns button {
      padding: 10px 18px;
      border: 1px solid #cfc9bc;
      background: #fff;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      color: #2c2c2a;
      transition: background 0.12s;
    }

    .btns button:hover { background: #f1efe8; }

    /* 피드백 박스 */
    .fb {
      margin-top: 16px;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      display: none;
    }

    .fb.ok {
      background: #e1f5ee;
      color: #085041;
    }

    .fb.partial {
      background: #faeedc;
      color: #854f0b;
    }

    .answer {
      margin-top: 10px;
      font-size: 14px;
      color: #5f5e5a;
    }

    .answer strong {
      color: #534ab7;
      font-weight: 700;
    }
  </style>
</head>
<body>

  <h1>♻️ 생명주기 순서 맞히기</h1>
  <p class="sub">
    3차시 · 아직 안 배웠어요. <em>느낌대로</em> 데이터의 한살이 6단계를 순서대로 놓아보세요.
    (위 칸을 누르면 아래로 내려가요)
  </p>

  <div class="label">① 단어 (눌러서 순서대로 배치)</div>
  <div class="pool" id="pool"></div>

  <div class="label">② 내가 만든 순서 (누르면 다시 위로)</div>
  <div class="seq" id="seq"></div>

  <div class="btns">
    <button onclick="check()">확인</button>
    <button onclick="reset()">다시 하기</button>
  </div>

  <div class="fb" id="fb">
    <div id="fbMsg"></div>
    <div class="answer" id="fbAnswer"></div>
  </div>

<script>
  /* ── 정답 순서 ─────────────────────────────────────────── */
  const ANSWER = ['생성', '수집', '저장', '활용', '보존', '폐기'];

  /* ── 점수별 메시지 ─────────────────────────────────────── */
  function getMsg(score, total) {
    if (score === total) {
      return '🎉 ' + total + '개 전부 정답! 보세요, 외울 필요도 없죠? 너무 당연한 순서예요.';
    }
    return '👍 ' + score + ' / ' + total + ' 맞았어요. 거의 다 맞히셨죠? 안 배웠는데도요 — 그만큼 당연한 흐름이라는 거예요.';
  }

  /* ── 초기화 ────────────────────────────────────────────── */
  function reset() {
    // 피드백 숨기기
    const fb = document.getElementById('fb');
    fb.style.display = 'none';
    fb.className = 'fb';

    // seq 비우기
    document.getElementById('seq').innerHTML = '';

    // pool 초기화 (셔플)
    const pool = document.getElementById('pool');
    pool.innerHTML = '';
    const shuffled = shuffle([...ANSWER]);
    shuffled.forEach(word => {
      const chip = makeChip(word, 'pool');
      pool.appendChild(chip);
    });
  }

  /* ── chip 생성 ─────────────────────────────────────────── */
  function makeChip(word, location) {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.dataset.word = word;
    chip.dataset.loc = location;

    if (location === 'seq') {
      const n = document.getElementById('seq').children.length + 1;
      chip.innerHTML = '<span class="n">' + n + '</span>' + word;
    } else {
      chip.textContent = word;
    }

    chip.addEventListener('click', () => onChipClick(chip));
    return chip;
  }

  /* ── 칩 클릭 처리 ──────────────────────────────────────── */
  function onChipClick(chip) {
    // 결과 확인 후에는 클릭 불가
    const fb = document.getElementById('fb');
    if (fb.style.display === 'block') return;

    const loc = chip.dataset.loc;
    const word = chip.dataset.word;

    if (loc === 'pool') {
      // pool → seq
      chip.remove();
      const seq = document.getElementById('seq');
      const newChip = makeChip(word, 'seq');
      seq.appendChild(newChip);
      renumberSeq();
    } else {
      // seq → pool
      chip.remove();
      renumberSeq();
      const pool = document.getElementById('pool');
      const newChip = makeChip(word, 'pool');
      pool.appendChild(newChip);
    }
  }

  /* ── seq 번호 재정렬 ────────────────────────────────────── */
  function renumberSeq() {
    const chips = document.querySelectorAll('#seq .chip');
    chips.forEach((c, i) => {
      const word = c.dataset.word;
      c.innerHTML = '<span class="n">' + (i + 1) + '</span>' + word;
    });
  }

  /* ── 확인 ──────────────────────────────────────────────── */
  function check() {
    const seqChips = Array.from(document.querySelectorAll('#seq .chip'));

    // 전부 배치했는지 확인
    if (seqChips.length < ANSWER.length) {
      alert('단어를 모두 배치한 뒤 확인하세요.');
      return;
    }

    const userOrder = seqChips.map(c => c.dataset.word);
    let score = 0;

    // chip 정답/오답 표시
    seqChips.forEach((chip, i) => {
      if (userOrder[i] === ANSWER[i]) {
        chip.classList.add('correct');
        score++;
      } else {
        chip.classList.add('wrong');
      }
    });

    // 피드백 표시
    const fb = document.getElementById('fb');
    const fbMsg = document.getElementById('fbMsg');
    const fbAnswer = document.getElementById('fbAnswer');

    fbMsg.textContent = getMsg(score, ANSWER.length);

    if (score === ANSWER.length) {
      fb.className = 'fb ok';
      fbAnswer.innerHTML = '';
    } else {
      fb.className = 'fb partial';
      fbAnswer.innerHTML =
        '정답: <strong>' + ANSWER.join(' → ') + '</strong><br>' +
        '※ 급소는 <strong>수집</strong>(망치면 못 고침)과 <strong>폐기</strong>(안 지우면 사고)';
    }

    fb.style.display = 'block';
  }

  /* ── 유틸: 배열 셔플 ────────────────────────────────────── */
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ── 시작 ──────────────────────────────────────────────── */
  reset();
</script>
</body>
</html>
