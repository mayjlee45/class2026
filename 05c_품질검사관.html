<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 품질 검사관 · 5차시 복습</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{--bg:#0f1626;--panel:#19223c;--ink:#eaf1ff;--sub:#9fb0d4;--line:#2b3658;
    --comp:#3d8bfd;--vld:#f7b733;--acc:#ff6b7a;--cons:#2ee6a6;}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#1b2747,#0a0f1e 70%);
    color:var(--ink);font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    display:flex;justify-content:center;padding:16px 14px 40px}
  .wrap{width:100%;max-width:720px}
  .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .top h1{font-size:16px;font-weight:800;margin-right:auto}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700}
  .pill b{color:var(--cons)} .pill.lives b{color:var(--acc)}
  /* belt */
  .belt{position:relative;height:150px;border-radius:16px;overflow:hidden;margin-bottom:6px;
    background:repeating-linear-gradient(115deg,#141d33,#141d33 22px,#10182b 22px,#10182b 44px);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center}
  .card{position:absolute;background:#fff;color:#1a2030;border-radius:12px;padding:16px 18px;
    width:80%;max-width:460px;text-align:center;box-shadow:0 10px 26px rgba(0,0,0,.5);font-weight:700;font-size:16.5px;line-height:1.4}
  .card .lab{display:block;font-size:12px;color:#7a8aa6;font-weight:700;margin-bottom:6px}
  .card.in{animation:slidein .35s ease both}
  .card.right{animation:slideok .4s ease both}
  .card.wrong{animation:shake .4s ease both}
  @keyframes slidein{from{transform:translateX(120%)}to{transform:translateX(0)}}
  @keyframes slideok{to{transform:translateX(-130%);opacity:0}}
  @keyframes shake{0%,100%{}20%{transform:translateX(-10px)}60%{transform:translateX(10px)}}
  .timerbar{height:9px;background:#0b1228;border-radius:999px;overflow:hidden;margin-bottom:14px;border:1px solid var(--line)}
  .timerbar>span{display:block;height:100%;width:100%;background:linear-gradient(90deg,#2ee6a6,#f7b733,#ff6b7a)}
  .btns{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  @media(min-width:540px){.btns{grid-template-columns:repeat(4,1fr)}}
  .b{border:2px solid;border-radius:14px;padding:14px 8px;cursor:pointer;background:#141d33;color:var(--ink);
    font-family:inherit;text-align:center;transition:transform .06s}
  .b:active{transform:scale(.96)}
  .b .t{font-size:16px;font-weight:800;display:block}
  .b .h{font-size:11px;color:var(--sub);display:block;margin-top:3px;line-height:1.3}
  .b.comp{border-color:var(--comp)} .b.comp .t{color:#8fbcff}
  .b.vld{border-color:var(--vld)} .b.vld .t{color:#ffd779}
  .b.acc{border-color:var(--acc)} .b.acc .t{color:#ff9aa6}
  .b.cons{border-color:var(--cons)} .b.cons .t{color:#7af0c8}
  .b.flash-ok{background:rgba(46,230,166,.25)} .b.flash-no{background:rgba(255,107,122,.25)}
  .fb{min-height:24px;margin-top:12px;text-align:center;font-size:14px;font-weight:700}
  .fb.ok{color:var(--cons)} .fb.no{color:var(--acc)}
  /* overlay */
  .ov{position:fixed;inset:0;background:rgba(8,12,22,.93);display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;z-index:50}
  .ov.hide{display:none}
  .ov h2{font-size:25px;margin-bottom:8px} .ov p{color:var(--sub);font-size:15px;line-height:1.6;max-width:460px;margin-bottom:6px}
  .ov .leg{font-size:13px;color:var(--sub);margin:10px 0 16px;line-height:1.8}
  .ov .leg b{color:var(--ink)}
  .btn{background:linear-gradient(90deg,#2ee6a6,#3d8bfd);color:#04122a;font-weight:800;font-size:17px;
    border:none;border-radius:12px;padding:13px 30px;cursor:pointer}
  .confetti{position:fixed;top:-14px;width:10px;height:14px;z-index:60;pointer-events:none;border-radius:2px;animation:cf linear forwards}
  @keyframes cf{to{transform:translateY(107vh) rotate(720deg);opacity:.9}}
  .banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.6);font-size:30px;font-weight:900;
    color:var(--cons);text-shadow:0 4px 18px rgba(46,230,166,.5);opacity:0;pointer-events:none;z-index:20}
  .banner.show{animation:bn 1.1s ease forwards}
  @keyframes bn{15%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}80%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🔎 데이터 품질 검사관</h1>
    <span class="pill">레벨 <b id="lv">1</b>/3</span>
    <span class="pill">처리 <b id="solved">0</b>/10</span>
    <span class="pill">점수 <b id="score">0</b></span>
    <span class="pill lives">생명 <b id="lives">❤❤❤</b></span>
  </div>

  <div class="belt" id="belt">
    <div class="banner" id="banner"></div>
    <div class="card in" id="card"><span class="lab">이 결함은 어느 기준 위반?</span><span id="cardtxt"></span></div>
  </div>
  <div class="timerbar"><span id="timer"></span></div>

  <div class="btns">
    <button class="b comp" data-k="완전성"><span class="t">완전성</span><span class="h">빠진 값(빈칸)</span></button>
    <button class="b vld" data-k="유효성"><span class="t">유효성</span><span class="h">형식·범위 규칙 위반</span></button>
    <button class="b acc" data-k="정확성"><span class="t">정확성</span><span class="h">형식OK·사실 다름</span></button>
    <button class="b cons" data-k="일관성"><span class="t">일관성</span><span class="h">같은 걸 다르게</span></button>
  </div>
  <div class="fb" id="fb"></div>

  <div class="ov" id="startOv">
    <h2>데이터 품질 검사관 🔎</h2>
    <p>컨베이어로 흘러오는 결함을 <b>제한 시간 안에</b> 4가지 기준으로 분류하세요!</p>
    <div class="leg">
      <b style="color:#8fbcff">완전성</b> 빈칸 · <b style="color:#ffd779">유효성</b> 규칙 위반 ·
      <b style="color:#ff9aa6">정확성</b> 사실 다름 · <b style="color:#7af0c8">일관성</b> 다르게 표기<br>
      10개마다 레벨업(시간 줄어듦) · 3레벨 · <b>생명 다 잃으면 레벨 1부터!</b>
    </div>
    <button class="btn" id="startBtn">시작하기 ▶</button>
  </div>
  <div class="ov hide" id="endOv">
    <h2 id="endTitle"></h2>
    <p id="endMsg"></p>
    <p id="endScore" style="font-size:20px;color:var(--ink);font-weight:800"></p>
    <button class="btn" id="againBtn">다시 하기 ↻</button>
  </div>
</div>

<script>
(function(){
  // k = 정답 기준
  const POOL={
    1:[
      {t:"담당자 칸이 비어 있음", k:"완전성"},
      {t:"정비결과 칸이 비어 있음", k:"완전성"},
      {t:"소요시간 −30분 (음수)", k:"유효성"},
      {t:"같은 장비를 '무전기'·'무선기' 혼용", k:"일관성"},
      {t:"'완료'인데 소요시간 0분", k:"정확성"},
      {t:"장비명 칸이 비어 있음", k:"완전성"},
    ],
    2:[
      {t:"소요시간 9999분 (범위 초과)", k:"유효성"},
      {t:"정비유형 코드 'D' (허용 A·B·C 밖)", k:"유효성"},
      {t:"부품교체를 'Y'와 '예'로 혼용", k:"일관성"},
      {t:"정비일이 미래 날짜(2027-…)", k:"정확성"},
      {t:"소요시간 칸이 비어 있음", k:"완전성"},
      {t:"날짜 칸에 '미정'이라는 글자", k:"유효성"},
      {t:"부대명을 '○○대'·'○○부대' 혼용", k:"일관성"},
    ],
    3:[
      {t:"날짜가 2026.1.31 / 03-15 제각각", k:"유효성"},
      {t:"실제 60분인데 6분으로 적힘", k:"정확성"},
      {t:"'정상'을 '이상'으로 거꾸로 입력", k:"정확성"},
      {t:"부대명을 실제와 다른 부대로 기재", k:"정확성"},
      {t:"코드 'a'와 'A' 대소문자 혼용", k:"일관성"},
      {t:"전화번호 칸이 비어 있음", k:"완전성"},
      {t:"날짜 2026-13-02 (13월)", k:"유효성"},
    ],
  };
  const DUR={1:6000,2:5000,3:4000};
  const GOAL=10, MAXLIVES=3;
  const $=id=>document.getElementById(id);

  let level=1, lives=MAXLIVES, solved=0, score=0, cur=null, rafId=0, tStart=0, dur=6000, busy=false, last=null, lastEnd='';

  function hud(){ $('lv').textContent=level; $('solved').textContent=solved; $('score').textContent=score;
    $('lives').textContent="❤".repeat(Math.max(0,lives))+"♡".repeat(Math.max(0,MAXLIVES-lives)); }

  function pick(){
    const pool=POOL[level]; let it;
    do { it=pool[Math.floor(Math.random()*pool.length)]; } while(pool.length>1 && it===last);
    last=it; return it;
  }
  function nextItem(){
    cur=pick(); busy=false;
    const c=$('card'); c.className='card in'; $('cardtxt').textContent=cur.t;
    dur=DUR[level]; tStart=performance.now();
    cancelAnimationFrame(rafId); rafId=requestAnimationFrame(tick);
  }
  function tick(now){
    const left=Math.max(0,1-(now-tStart)/dur);
    $('timer').style.width=(left*100)+'%';
    if(left<=0){ judge(null); return; }
    rafId=requestAnimationFrame(tick);
  }
  function judge(picked){
    if(busy) return; busy=true; cancelAnimationFrame(rafId);
    const correct = picked===cur.k;
    const c=$('card'), fb=$('fb');
    if(correct){ score+=10+ (level-1)*5; solved++;
      c.className='card right'; fb.className='fb ok'; fb.textContent="정답! ("+cur.k+")"; }
    else { lives--;
      c.className='card wrong'; fb.className='fb no';
      fb.textContent=(picked?"땡! ":"시간 초과! ")+"정답은 "+cur.k; }
    // 버튼 플래시
    document.querySelectorAll('.b').forEach(b=>{
      if(b.dataset.k===cur.k) b.classList.add('flash-ok');
      else if(b.dataset.k===picked) b.classList.add('flash-no');
    });
    hud();
    setTimeout(()=>{
      document.querySelectorAll('.b').forEach(b=>b.classList.remove('flash-ok','flash-no'));
      if(lives<=0){ gameOver(); return; }
      if(solved>=GOAL){ levelUp(); return; }
      nextItem();
    }, correct?420:760);
  }
  function levelUp(){
    if(level>=3){ win(); return; }
    level++; solved=0; hud(); banner("LEVEL "+level+"!  ⏱ 더 빨라져요");
    setTimeout(nextItem,1100);
  }
  function banner(txt){ const b=$('banner'); b.textContent=txt; b.classList.remove('show'); void b.offsetWidth; b.classList.add('show'); }

  function start(){
    level=1; lives=MAXLIVES; solved=0; score=0; last=null; hud();
    $('startOv').classList.add('hide'); $('endOv').classList.add('hide'); $('fb').textContent='';
    banner("LEVEL 1!"); setTimeout(nextItem,700);
  }
  function gameOver(){
    cancelAnimationFrame(rafId); lastEnd='over';
    $('endTitle').textContent="💔 생명 소진 — 해답 보고 가요!";
    $('endMsg').innerHTML="<div style='text-align:left;max-width:420px'><b>4대 기준 구분법</b><br>"+
      "🔵 <b>완전성</b> = 빈칸 (예: 담당자 칸 비어있음)<br>"+
      "🟡 <b>유효성</b> = 형식·범위 규칙 위반 (예: −30분, 코드 'D', 날짜에 글자)<br>"+
      "🔴 <b>정확성</b> = 형식은 맞는데 사실이 다름 (예: 완료인데 0분, 미래 날짜)<br>"+
      "🟢 <b>일관성</b> = 같은 걸 다르게 (예: 무전기/무선기)<br><br>"+
      "💡 헷갈릴 땐 — 규칙만으로 걸리면 <b>유효성</b>, 현실과 대조해야 잡히면 <b>정확성</b>!</div>";
    $('endScore').textContent="점수 "+score+" · 이 레벨("+level+")부터 다시!";
    $('endOv').classList.remove('hide');
  }
  function win(){
    cancelAnimationFrame(rafId); lastEnd='win';
    $('endTitle').textContent="🏆 3레벨 클리어!";
    $('endMsg').textContent="완벽한 품질 검사관이시네요! 완전·유효·정확·일관 — 이 4개를 습관처럼 떠올리면 끝. 그중 '정확성'만은 사람(여러분)이 확인하는 핵심 임무예요.";
    $('endScore').textContent="최종 점수 "+score;
    $('endOv').classList.remove('hide');
    confetti(); setTimeout(confetti,450);
  }
  function confetti(){ const cs=["#2ee6a6","#3d8bfd","#f7b733","#ff6b7a","#fff"];
    for(let i=0;i<50;i++){ const c=document.createElement('div'); c.className='confetti';
      c.style.left=Math.random()*100+'vw'; c.style.background=cs[i%cs.length];
      c.style.animationDuration=(1.6+Math.random()*1.5)+'s'; document.body.appendChild(c);
      setTimeout(()=>c.remove(),3400); } }

  function resume(){
    lives=MAXLIVES; solved=0; hud();
    $('endOv').classList.add('hide'); $('fb').textContent='';
    banner("LEVEL "+level+" 다시!"); setTimeout(nextItem,700);
  }
  document.querySelectorAll('.b').forEach(b=>b.addEventListener('click',()=>{ if(!busy&&cur) judge(b.dataset.k); }));
  $('startBtn').addEventListener('click',start);
  $('againBtn').addEventListener('click',()=>{ if(lastEnd==='win') start(); else resume(); });
})();
</script>
</body>
</html>
