<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1·2일차 복습</title><style>
    :root {
      --bg:#0f1720;--card:#172230;--line:#2a3a4d;--ink:#eaf1f8;
      --sub:#9fb2c6;--accent:#3d8bfd;--ok:#27ae60;--err:#e74c3c;--warn:#e67e22;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--ink);
      font-family:Pretendard,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
      min-height:100vh;padding:28px 14px;display:flex;justify-content:center;}
    .wrap{width:100%;max-width:680px;}
    .back{display:inline-block;margin-bottom:18px;font-size:13px;color:var(--sub);text-decoration:none;}
    .back:hover{color:var(--ink);}
    .tag{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);
      background:rgba(61,139,253,.12);border:1px solid rgba(61,139,253,.3);
      padding:4px 11px;border-radius:999px;margin-bottom:10px;}
    h2{font-size:22px;margin-bottom:8px;}
    .lead{color:var(--sub);font-size:14.5px;line-height:1.65;margin-bottom:22px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:18px 20px;margin-bottom:14px;}
    .card h3{font-size:15px;margin-bottom:10px;}
    .opts{display:grid;gap:8px;margin-top:10px;}
    .opts.g2{grid-template-columns:1fr 1fr;}
    .opts.g1{grid-template-columns:1fr;}
    .btn{padding:10px 14px;border-radius:10px;background:#1e3050;color:var(--ink);
      border:1px solid var(--line);font-size:14px;cursor:pointer;text-align:left;
      transition:background .15s,border-color .15s;}
    .btn:hover:not(:disabled){background:#253d63;border-color:var(--accent);}
    .btn:disabled{opacity:.55;cursor:default;}
    .btn.correct{background:rgba(39,174,96,.2)!important;border-color:var(--ok)!important;color:#6fe09f;}
    .btn.wrong{background:rgba(231,76,60,.15)!important;border-color:var(--err)!important;color:#f08080;}
    .fb{margin-top:10px;font-size:13.5px;padding:10px 14px;border-radius:10px;display:none;}
    .fb.ok{background:rgba(39,174,96,.12);color:#6fe09f;display:block;}
    .fb.err{background:rgba(231,76,60,.1);color:#f08080;display:block;}
    .progress{font-size:13px;color:var(--sub);margin-bottom:16px;}
    .score-box{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:24px;text-align:center;margin-top:18px;display:none;}
    .score-box .big{font-size:48px;margin-bottom:8px;}
    .score-box p{color:var(--sub);font-size:14px;}
    .foot{text-align:center;font-size:12px;color:#4a5a6a;margin-top:36px;
      padding-top:14px;border-top:1px solid var(--line);}
    /* drag styles */
    .drag-item{padding:10px 14px;background:#1e3050;border:1px solid var(--line);
      border-radius:10px;cursor:grab;font-size:14px;user-select:none;transition:opacity .15s;}
    .drag-item:active{cursor:grabbing;opacity:.7;}
    .drag-item.dragging{opacity:.4;}
    .drop-zone{min-height:54px;background:rgba(61,139,253,.06);border:2px dashed var(--line);
      border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px;}
    .drop-zone.over{border-color:var(--accent);background:rgba(61,139,253,.12);}
    .zone-label{font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600;}
</style></head>
<body><div class="wrap">
<a class="back" href="index.html">← 목록으로</a>
<div class="tag">🔄 13차시 복습</div><h2>1·2일차 핵심 복습 퀴즈</h2><p class="lead">3일차 시작 전 1·2일차 핵심 개념을 점검합니다.</p>

  <div class="progress" id="r12-prog">1 / 8</div>
  <div id="r12-area"></div>
  <div id="r12-final" class="score-box"></div>
  <script>
  var qs=[
    {q:"데이터 생명주기 6단계 중 '급소'가 아닌 것은?",opts:["수집","폐기","저장","수집과 폐기 둘 다 급소"],a:2,exp:"저장은 중요하지만 급소는 수집(잘못 모으면 못 고침)과 폐기(안 지우면 보안사고)."},
    {q:"'소요시간 -30분'은 어느 품질 기준 위반인가?",opts:["완전성","유효성","정확성","일관성"],a:1,exp:"음수 불가 규칙 위반 = 유효성. 규칙만으로 잡을 수 있는 오류."},
    {q:"전처리 기록을 남겨야 하는 핵심 이유는?",opts:["AI가 요구하기 때문","수정 이유·내용을 나중에 추적하기 위해","법적 의무","저장 용량 절약"],a:1,exp:"전처리 이력 = 재현성과 신뢰성. 누가 왜 어떻게 수정했는지 기록 필수."},
    {q:"평균보다 중앙값이 더 신뢰할 수 있는 경우는?",opts:["데이터가 적을 때","이상값이 있어 분포가 치우쳤을 때","정규분포일 때","데이터 수가 짝수일 때"],a:1,exp:"이상값이 있으면 평균이 왜곡됩니다. 중앙값은 이상값에 강합니다."},
    {q:"Orange3에서 이상값을 시각적으로 확인하기 좋은 위젯은?",opts:["Data Table","Impute","Box Plot","Correlations"],a:2,exp:"Box Plot: 중앙값·IQR·이상값을 한눈에 보여줍니다."},
    {q:"안스콤 콰르텟이 증명하는 것은?",opts:["평균이 가장 중요한 통계","같은 통계값이어도 분포가 전혀 다를 수 있다","데이터는 많을수록 좋다","상관관계 = 인과관계"],a:1,exp:"4개 데이터셋: 평균·분산·상관계수 동일, 시각화는 완전히 다름. 반드시 시각화해야 합니다."},
    {q:"메타데이터 6필드 중 '항목 정의'란?",opts:["데이터의 총 행 수","각 컬럼이 무슨 뜻인지 하나하나 설명","데이터명","갱신 날짜"],a:1,exp:"항목 정의(데이터 사전): A=정기, B=수시 처럼 코드 의미를 설명. 담당자가 떠나도 데이터를 읽을 수 있게 하는 열쇠."},
    {q:"GIGO의 의미와 데이터 관리자의 역할 연결로 옳은 것은?",opts:["Good In Good Out — AI가 좋으면 결과도 좋다","Garbage In Garbage Out — 현장 기록의 품질이 AI 결과를 결정한다","Get It Going On — 빨리 수집하면 된다","Global Information Good Order — 전 세계 데이터 통합"],a:1,exp:"GIGO: 현장에서 기록하는 데이터 관리자의 입력 품질이 AI 결과의 출발점입니다."},
  ];
  var cur=0,correct=0;
  function render(){
    var prog=document.getElementById('r12-prog'),area=document.getElementById('r12-area');
    if(cur>=qs.length){area.style.display='none';prog.style.display='none';
      var f=document.getElementById('r12-final');f.style.display='block';
      f.innerHTML='<div class="big">'+(correct>=7?'🏆':correct>=5?'📊':'📚')+'</div><div style="font-size:20px;font-weight:700;margin:8px 0">'+correct+'/'+qs.length+' 정답</div><p style="color:var(--sub);font-size:14px">'+(correct===qs.length?'1·2일차 완벽 마스터!':'틀린 문제를 다시 확인해보세요.')+'</p><button class="btn" style="margin-top:14px;background:var(--accent);color:#fff" onclick="cur=0;correct=0;document.getElementById('r12-final').style.display='none';document.getElementById('r12-area').style.display='block';document.getElementById('r12-prog').style.display='block';render()">다시 도전</button>';
      return;}
    prog.textContent=(cur+1)+' / '+qs.length;
    var q=qs[cur];
    area.innerHTML='<div class="card"><h3 style="font-size:16px;margin-bottom:16px">Q'+(cur+1)+'. '+q.q+'</h3>'+q.opts.map(function(o,i){return '<button class="btn" onclick="pick('+i+')" style="text-align:left;width:100%;margin-bottom:8px">'+['①','②','③','④'][i]+' '+o+'</button>';}).join('')+'<div id="qfb" class="fb"></div></div>';
  }
  function pick(i){var q=qs[cur];document.querySelectorAll('.btn').forEach(function(b){b.disabled=true;});if(i===q.a){correct++;document.querySelectorAll('.btn')[i].classList.add('correct');document.getElementById('qfb').textContent='✅ '+q.exp;document.getElementById('qfb').className='fb ok';}else{document.querySelectorAll('.btn')[i].classList.add('wrong');document.querySelectorAll('.btn')[q.a].classList.add('correct');document.getElementById('qfb').textContent='❌ '+q.exp;document.getElementById('qfb').className='fb err';}setTimeout(function(){cur++;render();},1800);}
  render();
  </script>

<div class="foot">데이터 관리자 기본·실무 교육 · 13차시</div>
</div></body></html>
