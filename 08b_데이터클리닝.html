<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 클리닝 작업실 · 8차시 마무리</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{--bg:#171a22;--panel:#222633;--ink:#eef2f8;--sub:#9aa3b5;--line:#333a4d;--ok:#2ee6a6;--no:#ff6b7a;--accent:#3dd6c4;}
  body{margin:0;min-height:100vh;background:#13151c;color:var(--ink);
    font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    display:flex;justify-content:center;padding:18px 14px 40px;transition:background .6s}
  body.clean{background:radial-gradient(120% 90% at 50% 0%,#13302e,#0c1a1c 70%)}
  .wrap{width:100%;max-width:600px}
  .top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .top h1{font-size:19px;margin-right:auto}
  .pill{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700}
  .lead{font-size:13.5px;color:var(--sub);line-height:1.55;margin-bottom:10px}
  .lead b{color:#fff}
  .gaugewrap{margin-bottom:16px}
  .glabel{display:flex;justify-content:space-between;font-size:12.5px;color:var(--sub);margin-bottom:5px;font-weight:700}
  .gauge{height:18px;border-radius:999px;overflow:hidden;background:linear-gradient(90deg,#5a5043,#4a4a52);border:1px solid var(--line)}
  .gauge>span{display:block;height:100%;width:0;background:linear-gradient(90deg,#2ee6a6,#46d3ff);transition:width .5s ease;box-shadow:0 0 16px rgba(46,230,166,.5)}
  .card{background:var(--panel);border:2px solid var(--line);border-radius:16px;padding:20px;margin-bottom:12px}
  .prob{font-size:12.5px;font-weight:800;color:var(--accent);margin-bottom:6px}
  .q{font-size:17px;font-weight:700;line-height:1.5}
  .opts{display:flex;flex-direction:column;gap:9px;margin-top:6px}
  .opt{text-align:left;background:#1b2030;border:1.5px solid var(--line);border-radius:11px;padding:13px 14px;
    font-size:14.5px;color:var(--ink);cursor:pointer;font-family:inherit;line-height:1.4;transition:border-color .15s,background .15s}
  .opt:hover{border-color:var(--accent)}
  .opt.ok{border-color:var(--ok);background:rgba(46,230,166,.13)}
  .opt.no{border-color:var(--no);background:rgba(255,107,122,.13)}
  .opt.dim{opacity:.5}
  .fb{display:none;margin-top:12px;padding:12px 14px;border-radius:11px;font-size:13.5px;line-height:1.55}
  .fb.show{display:block} .fb.ok{background:rgba(46,230,166,.1);border:1px solid var(--ok)} .fb.no{background:rgba(255,107,122,.1);border:1px solid var(--no)}
  .fb b{color:#fff}
  .next{display:none;margin-top:12px;width:100%;background:linear-gradient(90deg,#2ee6a6,#46d3ff);color:#06231e;font-weight:800;
    font-size:15px;border:none;border-radius:11px;padding:12px;cursor:pointer}
  .next.show{display:block}
  .lvtag{font-size:12.5px;color:var(--sub);font-weight:700;margin-bottom:10px}
  .result{display:none;background:linear-gradient(180deg,#16352f,#0e211d);border:1px solid var(--accent);border-radius:16px;padding:24px;text-align:center}
  .result.show{display:block}
  .result .big{font-size:50px} .result h2{font-size:22px;margin:6px 0}
  .result p{font-size:14px;color:#cfeee6;line-height:1.6}
  .result .sc{font-size:32px;font-weight:900;color:var(--ok);margin:8px 0}
  .cnote{background:#16241f;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;font-size:13.5px;line-height:1.5;text-align:left}
  .cnote .cq{font-weight:700} .cnote .ca{color:var(--ok);font-weight:700;font-size:13px;margin-top:3px} .cnote .cw{color:var(--sub);font-size:12.5px;margin-top:2px}
  .again{margin-top:10px;background:none;border:1px solid var(--line);color:var(--sub);border-radius:11px;padding:10px 22px;cursor:pointer;font-weight:700}
  .confetti{position:fixed;top:-14px;width:9px;height:13px;z-index:60;pointer-events:none;border-radius:2px;animation:cf linear forwards}
  @keyframes cf{to{transform:translateY(107vh) rotate(720deg);opacity:.9}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🧹 데이터 클리닝 작업실</h1>
    <span class="pill">레벨 <b id="lv">1</b>/3</span>
  </div>
  <p class="lead">지저분한 데이터를 <b>올바른 전처리</b>로 청소하세요. 잘 치울수록 <b>청결도 게이지</b>가 맑게 물들어요. (원본은 함부로 건드리지 않기!)</p>
  <div class="gaugewrap">
    <div class="glabel"><span>🧼 데이터 청결도</span><span id="gpct">0%</span></div>
    <div class="gauge"><span id="gfill"></span></div>
  </div>

  <div class="lvtag" id="lvtag"></div>
  <div class="card" id="card">
    <div class="prob" id="prob"></div>
    <div class="q" id="q"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
  </div>
  <button class="next" id="next">다음 ▶</button>

  <div class="result" id="result">
    <div class="big">✨</div><h2 id="rt"></h2>
    <div class="sc" id="sc"></div>
    <p id="rmsg"></p>
    <div id="notes"></div>
    <button class="again" id="again">다시 하기 ↻</button>
  </div>
</div>

<script>
(function(){
  // correct = 정답 인덱스
  const LEVELS = [
    { name:"레벨 1 — 기본 청소(결측·이상·중복·형식)", probs:[
      {p:"결측", q:"담당자 칸이 비어 있습니다.",
       o:["표시해두고 누락 현황을 기록한다","아무 이름이나 채워 넣는다","그 행을 삭제한다"], c:0,
       w:"결측은 함부로 채우거나 지우지 않고, <b>표시 + 문서화</b>가 기본입니다."},
      {p:"이상값", q:"소요시간이 -30분으로 적혀 있습니다.",
       o:["원본에서 바로 삭제한다","사본에서, 담당자에게 확인 후 처리한다","그냥 둔다"], c:1,
       w:"원본은 보존! <b>사본에서</b> 처리하고, 진짜 값은 담당자 확인(정확성=사람)."},
      {p:"중복", q:"완전히 똑같은 정비 기록이 두 번 입력돼 있습니다.",
       o:["둘 다 삭제한다","하나만 남기고 중복을 제거한다","그냥 둔다"], c:1,
       w:"중복은 <b>하나만 남기고 제거</b>. 그대로 두면 건수·통계가 부풀려집니다."},
      {p:"형식", q:"날짜가 2026.1.31 · 03-15-2026처럼 제각각입니다.",
       o:["YYYY-MM-DD로 통일한다","보기 싫은 건 지운다","그냥 둔다"], c:0,
       w:"형식은 <b>하나의 표준(YYYY-MM-DD)</b>으로 통일합니다."},
    ]},
    { name:"레벨 2 — 표준 맞추기", probs:[
      {p:"인코딩", q:"CSV를 열었더니 한글이 '뷁뷁'처럼 다 깨져 보입니다.",
       o:["깨진 글자를 다 지운다","UTF-8 인코딩으로 다시 열어 저장한다","그냥 둔다"], c:1,
       w:"인코딩 표준(<b>UTF-8</b>)을 안 맞춰서 깨진 것 — 다시 올바른 인코딩으로 열면 됩니다."},
      {p:"단위", q:"소요시간이 어떤 행은 '2시간', 어떤 행은 '120'으로 섞여 있습니다.",
       o:["단위를 하나(분)로 통일한다","그냥 평균을 낸다","큰 값만 지운다"], c:0,
       w:"단위가 섞이면 계산이 엉킵니다 — <b>단위 표준</b>으로 통일(예: 분)."},
      {p:"수치화", q:"'예/아니오' 응답을 계산·분석에 쓰려고 합니다.",
       o:["글자 그대로 둔다","예→1, 아니오→0으로 변환한다","응답을 지운다"], c:1,
       w:"문자를 <b>숫자로 변환(수치화)</b>해야 계산·분석이 가능합니다."},
      {p:"원칙", q:"이제 표준화 작업을 시작합니다. 어디서 작업할까요?",
       o:["원본 파일을 바로 고친다","사본을 만들어 사본에서만 작업한다","아무 데서나"], c:1,
       w:"<b>원본 불변</b> — 항상 사본에서. 삭제는 쉽지만 복구는 불가능합니다."},
    ]},
    { name:"레벨 3 — 판단이 필요한 청소", probs:[
      {p:"이상값?", q:"소요시간 9999분. 명백한 오류일 수도, 아주 긴 작업이 진짜일 수도 있습니다.",
       o:["무조건 삭제한다","담당자에게 사실을 확인한다","평균값으로 바꾼다"], c:1,
       w:"형식은 통과해도 사실은 사람만 압니다 — <b>담당자 확인</b>이 정답."},
      {p:"편향 결측", q:"무응답이 특정 그룹에만 몰려 있습니다.",
       o:["그 칸을 평균으로 채운다","'무응답 자체가 정보'일 수 있으니 표시·기록한다","그 그룹을 통째로 뺀다"], c:1,
       w:"몰린 무응답은 <b>그 자체가 신호</b>일 수 있어 함부로 채우거나 빼지 않습니다."},
      {p:"기록", q:"전처리를 여러 건 했습니다. 다음은?",
       o:["무엇을·왜 처리했는지 기록한다","처리했으니 기록은 생략한다","원본을 덮어쓴다"], c:0,
       w:"모든 처리는 <b>기록</b> — 실수 추적·인수인계·재작업 방지."},
      {p:"마무리", q:"청소를 다 끝냈습니다. 원본은?",
       o:["정리됐으니 원본은 삭제한다","원본과 백업은 그대로 보존한다","사본만 남긴다"], c:1,
       w:"<b>원본·백업은 보존</b>. 언제든 되돌릴 수 있어야 합니다."},
    ]},
  ];

  const $ = id => document.getElementById(id);
  const TOTAL = 12;
  let level=0, pi=0, done=0, score=0, busy=false, wrong=[];

  function setGauge(){
    const pct = Math.round(done/TOTAL*100);
    $('gfill').style.width = pct+'%';
    $('gpct').textContent = pct+'%';
    if(pct >= 60) document.body.classList.add('clean');
  }

  function render(){
    busy = false;
    const L = LEVELS[level], pr = L.probs[pi];
    $('lv').textContent = level+1;
    $('lvtag').textContent = L.name;
    $('prob').textContent = '🔧 '+pr.p;
    $('q').textContent = pr.q;
    const ow = $('opts');
    ow.innerHTML = '';
    pr.o.forEach((t, idx) => {
      const b = document.createElement('button');
      b.className = 'opt';
      b.textContent = t;
      b.addEventListener('click', () => pick(idx, b));
      ow.appendChild(b);
    });
    $('fb').className = 'fb';
    $('fb').innerHTML = '';
    $('next').className = 'next';
  }

  function pick(idx, btn){
    if(busy) return;
    busy = true;
    const pr = LEVELS[level].probs[pi];
    const ok = (idx === pr.c);
    if(ok){ score++; done++; setGauge(); }
    else { wrong.push(pr); }
    [...$('opts').children].forEach((b,j) => {
      b.disabled = true;
      if(j===pr.c) b.classList.add('ok');
      else if(j===idx) b.classList.add('no');
      else b.classList.add('dim');
    });
    const fb = $('fb');
    fb.className = 'fb show ' + (ok?'ok':'no');
    fb.innerHTML = (ok ? '✅ 깨끗해졌어요! ' : '아쉬워요 — ') + pr.w;
    const last = (level===LEVELS.length-1 && pi===LEVELS[level].probs.length-1);
    $('next').textContent = last ? '결과 보기' : '다음 ▶';
    $('next').className = 'next show';
  }

  $('next').onclick = () => {
    pi++;
    if(pi < LEVELS[level].probs.length){ render(); return; }
    if(level < LEVELS.length-1){ level++; pi=0; render(); }
    else finish();
  };

  function finish(){
    $('card').style.display = 'none';
    $('next').style.display = 'none';
    $('lvtag').style.display = 'none';
    const r = $('result');
    r.classList.add('show');
    document.body.classList.add('clean');
    $('sc').textContent = `청결도 ${Math.round(done/TOTAL*100)}% · 정답 ${score}/${TOTAL}`;
    if(score >= 10){
      $('rt').textContent = '반짝반짝, 깨끗한 데이터!';
      $('rmsg').innerHTML = '완벽한 클리닝! 결측은 표시·기록, 이상값은 확인, 중복은 제거, 형식·단위·인코딩은 표준으로 — 그리고 <b>언제나 사본에서, 원본은 보존</b>.';
      confetti(); setTimeout(confetti, 400);
    } else {
      $('rt').textContent = '청소 완료!';
      $('rmsg').innerHTML = '좋아요. 핵심은 <b>원본 보존 · 사본 작업 · 기록</b>, 그리고 함부로 삭제하지 않기예요.';
    }
    const notes = $('notes');
    if(wrong.length === 0){
      notes.innerHTML = '<div class="cnote" style="border-color:var(--ok);text-align:center">오답 없음 — 완벽한 청소!</div>';
    } else {
      notes.innerHTML = '<div style="font-weight:800;margin:6px 0;text-align:left">📒 오답노트</div>' +
        wrong.map(pr => `<div class="cnote"><div class="cq">🔧 ${pr.p} · ${pr.q}</div><div class="ca">정답: ${pr.o[pr.c]}</div><div class="cw">${pr.w}</div></div>`).join('');
    }
  }

  function confetti(){
    const cs = ["#2ee6a6","#46d3ff","#f7b733","#fff"];
    for(let i=0;i<46;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = cs[i % cs.length];
      c.style.animationDuration = (1.6 + Math.random()*1.4) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3200);
    }
  }

  $('again').onclick = () => {
    level=0; pi=0; done=0; score=0; wrong=[];
    document.body.classList.remove('clean');
    $('card').style.display = '';
    $('next').style.display = '';
    $('lvtag').style.display = '';
    $('result').classList.remove('show');
    setGauge();
    render();
  };

  setGauge();
  render();
})();
</script>
</body>
</html>
