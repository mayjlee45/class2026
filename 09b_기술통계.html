<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기술통계 계산기</title><style>
    :root {
      --bg:#0f1720;--card:#172230;--line:#2a3a4d;--ink:#eaf1f8;
      --sub:#9fb2c6;--accent:#3d8bfd;--ok:#27ae60;--err:#e74c3c;--warn:#e67e22;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--ink);
      font-family:Pretendard,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
      min-height:100vh;padding:28px 14px;display:flex;justify-content:center;}
    .wrap{width:100%;max-width:680px;}
    .back{display:inline-block;margin-bottom:18px;font-size:13px;color:var(--sub);text-decoration:none;}
    .back:hover{color:var(--ink);}
    .tag{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);
      background:rgba(61,139,253,.12);border:1px solid rgba(61,139,253,.3);
      padding:4px 11px;border-radius:999px;margin-bottom:10px;}
    h2{font-size:22px;margin-bottom:8px;}
    .lead{color:var(--sub);font-size:14.5px;line-height:1.65;margin-bottom:22px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:18px 20px;margin-bottom:14px;}
    .card h3{font-size:15px;margin-bottom:10px;}
    .opts{display:grid;gap:8px;margin-top:10px;}
    .opts.g2{grid-template-columns:1fr 1fr;}
    .opts.g1{grid-template-columns:1fr;}
    .btn{padding:10px 14px;border-radius:10px;background:#1e3050;color:var(--ink);
      border:1px solid var(--line);font-size:14px;cursor:pointer;text-align:left;
      transition:background .15s,border-color .15s;}
    .btn:hover:not(:disabled){background:#253d63;border-color:var(--accent);}
    .btn:disabled{opacity:.55;cursor:default;}
    .btn.correct{background:rgba(39,174,96,.2)!important;border-color:var(--ok)!important;color:#6fe09f;}
    .btn.wrong{background:rgba(231,76,60,.15)!important;border-color:var(--err)!important;color:#f08080;}
    .fb{margin-top:10px;font-size:13.5px;padding:10px 14px;border-radius:10px;display:none;}
    .fb.ok{background:rgba(39,174,96,.12);color:#6fe09f;display:block;}
    .fb.err{background:rgba(231,76,60,.1);color:#f08080;display:block;}
    .progress{font-size:13px;color:var(--sub);margin-bottom:16px;}
    .score-box{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:24px;text-align:center;margin-top:18px;display:none;}
    .score-box .big{font-size:48px;margin-bottom:8px;}
    .score-box p{color:var(--sub);font-size:14px;}
    .foot{text-align:center;font-size:12px;color:#4a5a6a;margin-top:36px;
      padding-top:14px;border-top:1px solid var(--line);}
    /* drag styles */
    .drag-item{padding:10px 14px;background:#1e3050;border:1px solid var(--line);
      border-radius:10px;cursor:grab;font-size:14px;user-select:none;transition:opacity .15s;}
    .drag-item:active{cursor:grabbing;opacity:.7;}
    .drag-item.dragging{opacity:.4;}
    .drop-zone{min-height:54px;background:rgba(61,139,253,.06);border:2px dashed var(--line);
      border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px;}
    .drop-zone.over{border-color:var(--accent);background:rgba(61,139,253,.12);}
    .zone-label{font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600;}
</style></head>
<body><div class="wrap">
<a class="back" href="index.html">← 목록으로</a>
<div class="tag">📊 9차시 계산기</div><h2>기술통계 직접 계산해보기</h2><p class="lead">숫자를 입력하면 평균·중앙값·표준편차·이상값을 바로 계산합니다.</p>

  <div class="card">
    <h3>기술통계 계산기</h3>
    <p style="font-size:13.5px;color:var(--sub);margin-bottom:14px">숫자를 쉼표로 구분해서 입력하고 계산해보세요.</p>
    <textarea id="raw-input" rows="3" placeholder="예: 30, 45, -30, 60, 9999, 45, 30, 60, 45" style="width:100%;background:#1e3050;border:1px solid var(--line);border-radius:8px;padding:10px;color:var(--ink);font-size:14px;font-family:inherit;resize:vertical;"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn" style="flex:1;background:var(--accent);color:#fff" onclick="calcStats()">계산</button>
      <button class="btn" style="flex:1" onclick="loadSample()">샘플 데이터 불러오기</button>
    </div>
  </div>
  <div class="card" id="stats-result" style="display:none">
    <h3>📊 기술통계 결과</h3>
    <div id="stats-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px"></div>
  </div>
  <div class="card" id="trap-box" style="display:none">
    <h3>⚠️ 평균의 함정</h3>
    <div id="trap-text" style="font-size:13.5px;color:var(--sub);line-height:1.7"></div>
  </div>
  <script>
  function loadSample(){
    document.getElementById('raw-input').value="30, 45, -30, 60, 9999, 45, 30, 60, 45, 60, 30, 45";
    calcStats();
  }
  function calcStats(){
    var raw=document.getElementById('raw-input').value;
    var nums=raw.split(',').map(function(s){return parseFloat(s.trim());}).filter(function(n){return !isNaN(n);});
    if(nums.length<2){alert('숫자를 2개 이상 입력하세요.');return;}
    nums.sort(function(a,b){return a-b;});
    var n=nums.length;
    var sum=nums.reduce(function(a,b){return a+b;},0);
    var mean=(sum/n).toFixed(2);
    var mid=n%2===0?(nums[n/2-1]+nums[n/2])/2:nums[Math.floor(n/2)];
    var variance=nums.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/n;
    var std=Math.sqrt(variance).toFixed(2);
    var q1=nums[Math.floor(n*0.25)];
    var q3=nums[Math.floor(n*0.75)];
    var iqr=q3-q1;
    var outliers=nums.filter(function(x){return x<q1-1.5*iqr||x>q3+1.5*iqr;});
    var stats=[
      {label:"개수 (N)",val:n,tip:"데이터 포인트 수"},
      {label:"합계",val:sum.toFixed(1),tip:"모든 값의 합"},
      {label:"평균 (Mean)",val:mean,tip:"합계 ÷ 개수"},
      {label:"중앙값 (Median)",val:mid.toFixed(1),tip:"정렬 후 가운데 값 — 이상값에 강함"},
      {label:"표준편차 (Std)",val:std,tip:"평균에서 얼마나 퍼져 있는지"},
      {label:"최솟값",val:nums[0],tip:"가장 작은 값"},
      {label:"최댓값",val:nums[n-1],tip:"가장 큰 값"},
      {label:"이상값",val:outliers.length>0?outliers.join(', '):'없음',tip:"IQR 기준 이상값"},
    ];
    var grid=document.getElementById('stats-grid');
    grid.innerHTML=stats.map(function(s){
      return '<div style="background:#1e3050;border:1px solid var(--line);border-radius:10px;padding:12px"><div style="font-size:12px;color:var(--sub)">'+s.label+'</div><div style="font-size:20px;font-weight:700;color:var(--ink);margin:4px 0">'+s.val+'</div><div style="font-size:11px;color:#4a5a6a">'+s.tip+'</div></div>';
    }).join('');
    document.getElementById('stats-result').style.display='block';
    var trap=document.getElementById('trap-box');
    var trapText=document.getElementById('trap-text');
    trap.style.display='block';
    if(outliers.length>0){
      var cleanNums=nums.filter(function(x){return x>=q1-1.5*iqr&&x<=q3+1.5*iqr;});
      var cleanMean=(cleanNums.reduce(function(a,b){return a+b;},0)/cleanNums.length).toFixed(1);
      trapText.innerHTML='<b style="color:var(--warn)">이상값 발견: '+outliers.join(', ')+'</b><br>'
        +'이상값을 포함한 평균: <b style="color:var(--err)">'+mean+'</b><br>'
        +'이상값 제거 후 평균: <b style="color:var(--ok)">'+cleanMean+'</b><br>'
        +'→ 중앙값('+mid.toFixed(1)+')이 더 신뢰할 수 있는 대푯값입니다.<br>'
        +'평균만 보면 이상값에 속습니다. 항상 분포와 중앙값을 함께 확인하세요!';
    } else {
      trapText.innerHTML='이상값이 없어 평균('+mean+')과 중앙값('+mid.toFixed(1)+')이 비슷합니다. 데이터가 비교적 균등하게 분포되어 있습니다.';
    }
  }
  </script>

<div class="foot">데이터 관리자 기본·실무 교육 · 9차시</div>
</div></body></html>
