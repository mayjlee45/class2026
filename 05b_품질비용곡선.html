<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>품질 비용 곡선 (5차시)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "맑은 고딕", sans-serif;
    background: #FAFAF8; color: #2C2C2A; line-height: 1.55;
    max-width: 720px; margin: 0 auto; padding: 24px 16px;
  }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #5F5E5A; margin-bottom: 16px; }
  .sub b { color: #2C2C2A; }
  .legend {
    display: flex; gap: 16px; flex-wrap: wrap;
    font-size: 13px; color: #5F5E5A; margin-bottom: 6px;
  }
  .legend span { display: flex; align-items: center; gap: 6px; }
  .wrap { position: relative; width: 100%; height: 280px; }
  .ctrl { display: flex; align-items: center; gap: 12px; margin: 16px 0 12px; }
  .ctrl input { flex: 1; }
  .cards { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .card { background: #fff; border: 1px solid #E6E3DA; border-radius: 10px; padding: 10px; }
  .card .t { font-size: 12px; color: #5F5E5A; }
  .card .v { font-size: 22px; font-weight: 600; }
  .note { font-size: 14px; color: #5F5E5A; margin-top: 14px; min-height: 44px; }
</style>
</head>
<body>
  <h1>📉 품질 비용 곡선</h1>
  <p class="sub">5차시 · 슬라이더로 <b>결함 수준</b>을 옮겨보세요. 완벽(0%)도, 방치(100%)도 아닌 <b>가운데 최적점</b>을 찾는 게 목표예요.</p>

  <div class="legend">
    <span><span style="width:18px;height:0;border-top:3px solid #888780;"></span>실패비용</span>
    <span><span style="width:18px;height:0;border-top:3px dashed #378ADD;"></span>예방비용</span>
    <span><span style="width:18px;height:0;border-top:3px dotted #E24B4A;"></span>총비용</span>
  </div>

  <div class="wrap">
    <canvas id="cq" role="img" aria-label="결함이 줄수록 실패비용은 내려가고 예방비용은 올라가며, 총비용은 가운데가 낮은 U자 곡선"></canvas>
  </div>

  <div class="ctrl">
    <label style="font-size:13px;color:#5F5E5A;">결함 수준</label>
    <input type="range" id="d" min="0" max="6" step="1" value="3">
    <span id="dlab" style="font-size:13px;font-weight:600;min-width:84px;">40% 결함</span>
  </div>

  <div class="cards">
    <div class="card">
      <div class="t">실패비용</div>
      <div class="v" id="f" style="color:#444441;">28</div>
    </div>
    <div class="card">
      <div class="t">예방비용</div>
      <div class="v" id="p" style="color:#185FA5;">24</div>
    </div>
    <div class="card">
      <div class="t">총비용</div>
      <div class="v" id="tt" style="color:#A32D2D;">52</div>
    </div>
  </div>

  <p class="note" id="msg"></p>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels  = ["100%","80%","60%","40%","20%","10%","0%"];
const failure = [95, 68, 45, 28, 15, 9, 3];
const prevent = [3,  7,  13, 24, 42, 60, 97];
const total   = failure.map((v, i) => v + prevent[i]);
const opt     = total.indexOf(Math.min(...total)); // index 3 = 40%

const msgs = [
  "결함 100%. 거의 손 안 댄 상태 — 실패비용이 폭발합니다.",
  "결함 80%. 여전히 실패비용이 높습니다.",
  "결함 60%. 균형이 예방에 이제 가기 시작하는 구간.",
  "결함 40% 부근 — 총비용이 가장 낮은 최적 구간! 완벽이 아니라 여기가 목표예요.",
  "결함 20%. 낮은 실패지만 예방비용이 빠르게 올라갑니다.",
  "결함 10%. 예방비용이 급등하는 구간 — 가성비가 떨어집니다.",
  "결함 0%(완벽). 예방비용 최고 — 완벽 추구는 오히려 낭비예요.",
];

const ch = new Chart(document.getElementById('cq'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        data: failure,
        borderColor: '#888780',
        tension: .4,
        pointRadius: 0,
        borderWidth: 2
      },
      {
        data: prevent,
        borderColor: '#378ADD',
        borderDash: [6, 4],
        tension: .4,
        pointRadius: 0,
        borderWidth: 2
      },
      {
        data: total,
        borderColor: '#E24B4A',
        borderDash: [2, 3],
        tension: .4,
        pointRadius: [5,0,0,4,0,0,0],
        pointBackgroundColor: ['#E24B4A','#E24B4A','#E24B4A','#0F6E56','#E24B4A','#E24B4A','#E24B4A'],
        borderWidth: 2
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false }
    },
    scales: {
      y: {
        min: 0, max: 110,
        title: { display: true, text: '비용' },
        grid: { color: 'rgba(0,0,0,.07)' }
      },
      x: {
        title: {
          display: true,
          text: '% 결함  (왼쪽=비품질 · 오른쪽=완벽)'
        },
        grid: { display: false }
      }
    }
  }
});

const d = document.getElementById('d');

function upd() {
  const i = +d.value;
  document.getElementById('dlab').textContent = labels[i] + ' 결함';
  document.getElementById('f').textContent  = Math.round(failure[i]);
  document.getElementById('p').textContent  = Math.round(prevent[i]);
  document.getElementById('tt').textContent = Math.round(total[i]);
  document.getElementById('msg').textContent = msgs[i];
  ch.data.datasets[2].pointRadius =
    labels.map((_, k) => k === i ? 5 : (k === opt ? 4 : 0));
  ch.data.datasets[2].pointBackgroundColor =
    labels.map((_, k) => k === opt ? '#0F6E56' : '#E24B4A');
  ch.update();
}

d.addEventListener('input', upd);
upd();
</script>
</body>
</html>
