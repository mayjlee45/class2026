<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 개념 잇기 · 7차시 복습</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{--bg:#0d1430;--panel:#172150;--ink:#eaf1ff;--sub:#9fb0e0;--line:#2a3568;--ok:#2ee6a6;--no:#ff6b7a;--accent:#7c9bff;}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#1c2a63,#0a0f24 70%);
    color:var(--ink);font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    display:flex;justify-content:center;padding:18px 14px 40px}
  .wrap{width:100%;max-width:680px}
  .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
  .top h1{font-size:17px;font-weight:800;margin-right:auto}
  .pill{background:#1b2550;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:700}
  .pill b{color:var(--ok)}
  .lvname{font-size:13px;color:var(--sub);font-weight:700;margin-bottom:10px}
  .lead{font-size:13px;color:var(--sub);margin-bottom:12px;line-height:1.5}
  .lead b{color:#fff}
  .board{position:relative}
  svg.lines{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
  .cols{position:relative;display:flex;gap:64px;z-index:2}
  .col{flex:1;display:flex;flex-direction:column;gap:10px}
  .it{background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:13px 12px;font-size:14px;
    font-weight:600;line-height:1.35;cursor:pointer;min-height:54px;display:flex;align-items:center;transition:border-color .15s,background .15s}
  .it.r{justify-content:flex-start}
  .col.left .it{justify-content:flex-end;text-align:right}
  .it:hover{border-color:var(--accent)}
  .it.sel{border-color:var(--accent);background:#22307a}
  .it.done{border-color:var(--ok);background:rgba(46,230,166,.12);cursor:default;color:#cffcec}
  .it.bad{border-color:var(--no);background:rgba(255,107,122,.15);animation:shake .3s}
  @keyframes shake{0%,100%{}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .res{margin-top:12px;text-align:center;font-size:14px;font-weight:700;color:var(--sub);min-height:20px}
  .banner{margin-top:12px;background:linear-gradient(180deg,#15306a,#0e1f4a);border:1px solid var(--accent);
    border-radius:14px;padding:16px;text-align:center;display:none}
  .banner.show{display:block}
  .banner p{font-size:15px;color:#dde7ff;margin:4px 0}
  .btn{margin-top:8px;background:linear-gradient(90deg,#7c9bff,#2ee6a6);color:#06122a;font-weight:800;font-size:15px;
    border:none;border-radius:11px;padding:11px 24px;cursor:pointer}
  .confetti{position:fixed;top:-14px;width:9px;height:13px;z-index:60;pointer-events:none;border-radius:2px;animation:cf linear forwards}
  @keyframes cf{to{transform:translateY(107vh) rotate(720deg);opacity:.9}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🧠 AI 개념 잇기</h1>
    <span class="pill">레벨 <b id="lv">1</b>/3</span>
    <span class="pill">맞춤 <b id="cnt">0</b>/5</span>
  </div>
  <div class="lvname" id="lvname"></div>
  <p class="lead">왼쪽 개념을 누르고 → 오른쪽 설명을 누르면 <b>선으로 이어집니다.</b> 5쌍을 모두 맞히면 다음 레벨!</p>
  <div class="board" id="board">
    <svg class="lines" id="svg"></svg>
    <div class="cols">
      <div class="col left" id="left"></div>
      <div class="col right" id="right"></div>
    </div>
  </div>
  <div class="res" id="res"></div>
  <div class="banner" id="banner"></div>
</div>

<script>
(function(){
  const LEVELS = [
    [
      ["지도학습",   "정답(라벨)을 보고 배운다"],
      ["비지도학습", "정답 없이 비슷한 것끼리 묶는다"],
      ["강화학습",   "보상·시행착오로 배운다"],
      ["생성형 AI",  "새로운 글·그림을 만들어낸다"],
      ["분류",       "정상/이상으로 나눈다"],
    ],
    [
      ["LLM",       "거대 언어 모델 (ChatGPT 등)"],
      ["트랜스포머", "생성형 AI의 핵심 엔진"],
      ["어텐션",    "중요한 단어에 집중한다"],
      ["환각",      "없는 사실을 그럴듯하게 지어낸다"],
      ["라벨",      "데이터에 붙인 '정답' 표시"],
    ],
    [
      ["멀티모달", "텍스트·이미지·음성을 함께 다룬다"],
      ["RAG",      "우리 데이터를 검색해 근거로 쓴다"],
      ["블랙박스", "내부 판단 과정을 다 볼 수 없다"],
      ["편향",     "데이터가 치우치면 AI도 치우친다"],
      ["RLHF",     "사람의 선호에 맞춰 조정한다"],
    ],
  ];

  const $ = id => document.getElementById(id);
  let level = 0, matched = 0, sel = null;

  function shuffle(a){
    a = a.slice();
    for(let i=a.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [a[i],a[j]] = [a[j],a[i]];
    }
    return a;
  }

  function build(){
    matched = 0; sel = null;
    $('cnt').textContent = '0';
    $('lv').textContent = level + 1;
    $('lvname').textContent = `레벨 ${level+1} — ${["기본 학습 방식","생성형·핵심 용어","2026 흐름·응용"][level]}`;
    $('res').textContent = '';
    $('banner').classList.remove('show');
    $('svg').innerHTML = '';
    const pairs = LEVELS[level];
    const L = $('left'), R = $('right');
    L.innerHTML = ''; R.innerHTML = '';

    // 왼쪽 — 개념 (순서 고정)
    pairs.forEach((p, idx) => {
      const d = document.createElement('div');
      d.className = 'it';
      d.dataset.id = idx;
      d.textContent = p[0];
      d.addEventListener('click', () => pickLeft(d));
      L.appendChild(d);
    });

    // 오른쪽 — 설명 (순서 셔플)
    shuffle(pairs.map((p, idx) => ({t: p[1], id: idx}))).forEach(o => {
      const d = document.createElement('div');
      d.className = 'it r';
      d.dataset.id = o.id;
      d.textContent = o.t;
      d.addEventListener('click', () => pickRight(d));
      R.appendChild(d);
    });
  }

  function pickLeft(d){
    if(d.classList.contains('done')) return;
    document.querySelectorAll('#left .it').forEach(x => x.classList.remove('sel'));
    sel = d;
    d.classList.add('sel');
  }

  function pickRight(d){
    if(!sel || d.classList.contains('done')) return;
    if(d.dataset.id === sel.dataset.id){
      // 정답
      sel.classList.remove('sel');
      sel.classList.add('done');
      d.classList.add('done');
      drawLine(sel, d);
      matched++;
      $('cnt').textContent = matched;
      sel = null;
      if(matched === 5) levelDone();
    } else {
      // 오답
      d.classList.add('bad');
      const s = sel;
      setTimeout(() => { d.classList.remove('bad'); s.classList.remove('sel'); }, 320);
      sel = null;
      $('res').textContent = '다시 — 맞는 설명을 골라보세요';
      setTimeout(() => { $('res').textContent = ''; }, 900);
    }
  }

  function drawLine(a, b){
    const br = $('board').getBoundingClientRect();
    const ar = a.getBoundingClientRect();
    const rr = b.getBoundingClientRect();
    const x1 = ar.right  - br.left;
    const y1 = ar.top + ar.height / 2 - br.top;
    const x2 = rr.left   - br.left;
    const y2 = rr.top + rr.height / 2 - br.top;
    const ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    ln.setAttribute('x1', x1);
    ln.setAttribute('y1', y1);
    ln.setAttribute('x2', x2);
    ln.setAttribute('y2', y2);
    ln.setAttribute('stroke', '#2ee6a6');
    ln.setAttribute('stroke-width', '3');
    ln.setAttribute('stroke-dasharray', '6 5');
    ln.setAttribute('stroke-linecap', 'round');
    $('svg').appendChild(ln);
  }

  function levelDone(){
    const b = $('banner');
    if(level >= 2){
      b.innerHTML = `<p>🏆 <b>3레벨 클리어!</b> AI 핵심 개념을 모두 이으셨어요.</p><button class="btn" id="rb">다시 하기 ↻</button>`;
      b.classList.add('show');
      confetti();
      setTimeout(confetti, 400);
      $('rb').onclick = () => { level = 0; build(); };
    } else {
      b.innerHTML = `<p>✅ <b>레벨 ${level+1} 통과!</b> 다음 레벨로.</p><button class="btn" id="rb">다음 레벨 ▶</button>`;
      b.classList.add('show');
      $('rb').onclick = () => { level++; build(); };
    }
  }

  function confetti(){
    const cs = ["#2ee6a6","#7c9bff","#f7b733","#ff6b7a","#fff"];
    for(let i=0;i<46;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random()*100 + 'vw';
      c.style.background = cs[i % cs.length];
      c.style.animationDuration = (1.6 + Math.random()*1.4) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3200);
    }
  }

  build();
})();
</script>
</body>
</html>
