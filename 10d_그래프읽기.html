<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>그래프 읽기 3단계 퀴즈 · 10차시 복습</title>
<style>
  :root{
    --ink:#eaf2ff; --sub:#9ab0d0; --panel:#19283f; --line:#2a426b;
    --ok:#2ee6a6; --no:#ff6b7a; --accent:#56b0ff; --gold:#ffce5a;
    --bg:#0d1626;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--ink);
    font-family:"Pretendard","Malgun Gothic","Apple SD Gothic Neo",sans-serif;
    display:flex; justify-content:center; padding:30px 16px;
  }
  .wrap{
    width:100%; max-width:720px; background:var(--panel);
    border:1px solid var(--line); border-radius:18px; padding:26px 28px 32px;
  }
  .top{display:flex; align-items:center; justify-content:space-between; gap:12px;}
  .top h1{font-size:1.3rem; margin:0; display:flex; align-items:center; gap:8px;}
  .badge{
    background:var(--bg); border:1px solid var(--line); color:var(--accent);
    padding:4px 12px; border-radius:999px; font-size:.85rem; font-weight:700;
  }
  .bar{height:6px; background:var(--bg); border-radius:999px; margin:14px 0 6px; overflow:hidden;}
  .bar .fill{height:100%; background:linear-gradient(90deg,var(--accent),var(--ok)); width:0%; transition:width .3s;}
  .level{color:var(--gold); font-size:.85rem; font-weight:700; margin-bottom:14px;}
  .chartbox{
    background:var(--bg); border:1px solid var(--line); border-radius:12px;
    padding:10px; margin-bottom:16px;
  }
  svg{width:100%; height:220px; display:block;}
  .qtext{font-size:1.05rem; font-weight:700; margin:6px 0 16px; line-height:1.5;}
  .hint{color:var(--sub); font-size:.85rem; margin:-8px 0 14px;}
  .opts{display:flex; flex-direction:column; gap:10px; margin-bottom:14px;}
  .opt{
    background:var(--bg); border:1px solid var(--line); color:var(--ink);
    padding:13px 16px; border-radius:10px; font-size:.98rem; text-align:left;
    cursor:pointer; transition:all .15s;
  }
  .opt:hover:not(:disabled){border-color:var(--accent);}
  .opt:disabled{cursor:default;}
  .opt.ok{border-color:var(--ok); background:rgba(46,230,166,.12); color:var(--ok); font-weight:700;}
  .opt.no{border-color:var(--no); background:rgba(255,107,122,.12); color:var(--no); font-weight:700;}
  .opt.dim{opacity:.45;}
  .fb{
    display:none; border-radius:10px; padding:13px 16px; margin-bottom:14px;
    font-size:.92rem; line-height:1.5; border:1px solid var(--line);
  }
  .fb.show{display:block;}
  .fb.ok{border-color:var(--ok); background:rgba(46,230,166,.1); color:var(--ok);}
  .fb.no{border-color:var(--no); background:rgba(255,107,122,.1); color:var(--no);}
  .next{
    display:none; width:100%; padding:13px; border:none; border-radius:10px;
    background:var(--accent); color:#0d1626; font-weight:800; font-size:1rem; cursor:pointer;
  }
  .next.show{display:block;}
  .result{display:none; text-align:center;}
  .result.show{display:block;}
  .result .score{font-size:2.4rem; font-weight:900; color:var(--gold); margin:10px 0;}
  .note{
    background:var(--bg); border:1px solid var(--line); border-radius:12px;
    padding:18px 20px; margin:16px 0; text-align:left;
  }
  .note h3{margin:0 0 10px; font-size:1.05rem;}
  .note h3.perfect{color:var(--ok); text-align:center;}
  .note ul{margin:0; padding-left:18px; color:var(--sub); font-size:.9rem; line-height:1.7;}
  .note li b{color:var(--ink);}
  .again{
    padding:12px 26px; border:none; border-radius:10px; background:var(--accent);
    color:#0d1626; font-weight:800; cursor:pointer; font-size:.95rem;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>📈 그래프 읽기 퀴즈</h1>
    <div class="badge" id="badge">1 / 12</div>
  </div>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div class="level" id="level"></div>

  <div id="quizArea">
    <div class="chartbox"><svg id="svg" viewBox="0 0 300 180"></svg></div>
    <div class="qtext" id="qtext"></div>
    <div class="hint" id="hint" style="display:none;"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="nextBtn">다음 ▶</button>
  </div>

  <div class="result" id="resultArea">
    <div>점수</div>
    <div class="score" id="scoreText">0 / 12</div>
    <div class="note" id="noteArea"></div>
    <button class="again" id="againBtn">다시 풀기 ↻</button>
  </div>
</div>

const SVGNS="http://www.w3.org/2000/svg";
let idx=0, score=0, answered=false, wrongList=[];

const svg=document.getElementById('svg');
const qtextEl=document.getElementById('qtext');
const optsEl=document.getElementById('opts');
const fbEl=document.getElementById('fb');
const nextBtn=document.getElementById('nextBtn');
const badge=document.getElementById('badge');
const fill=document.getElementById('fill');
const levelEl=document.getElementById('level');
const hintEl=document.getElementById('hint');
const quizArea=document.getElementById('quizArea');
const resultArea=document.getElementById('resultArea');

function el(tag,attrs){
  const e=document.createElementNS(SVGNS,tag);
  for(const k in attrs) e.setAttribute(k,attrs[k]);
  return e;
}

function clearSvg(){ svg.innerHTML=""; }

function drawAxes(){
  svg.appendChild(el('line',{x1:30,y1:150,x2:290,y2:150,stroke:'#2a426b','stroke-width':1}));
  svg.appendChild(el('line',{x1:30,y1:20,x2:30,y2:150,stroke:'#2a426b','stroke-width':1}));
}

function barGeom(n,{x0=35,gap=10}={}){
  const totalGap=gap*(n-1);
  const w=(255-totalGap)/n;
  const xs=[];
  for(let i=0;i<n;i++) xs.push(x0+i*(w+gap));
  return {w,xs};
}

function renderChart(q){
  clearSvg();
  const d=q.data;
  if(q.chartType==='hist' || q.chartType==='histClick'){
    drawAxes();
    const n=d.heights.length;
    const {w,xs}=barGeom(n,{x0:35,gap:6});
    d.heights.forEach((h,i)=>{
      const bar=el('rect',{x:xs[i],y:150-h*0.9,width:w,height:h*0.9,fill:'#56b0ff',rx:2});
      if(q.chartType==='histClick'){
        bar.style.cursor='pointer';
        bar.dataset.idx=i;
        bar.addEventListener('click',()=>handleClick(i===d.maxIdx,bar));
      }
      svg.appendChild(bar);
      if(d.labels[i]) svg.appendChild(el('text',{x:xs[i]+w/2,y:164,'text-anchor':'middle',fill:'#9ab0d0','font-size':9},)).textContent=d.labels[i];
    });
  }
  else if(q.chartType==='bar' || q.chartType==='barClick'){
    drawAxes();
    const n=d.values.length;
    const {w,xs}=barGeom(n,{x0:40,gap:15});
    const ymax=d.ymax||Math.max(...d.values)*1.15;
    d.values.forEach((v,i)=>{
      const h=(v/ymax)*126;
      const bar=el('rect',{x:xs[i],y:150-h,width:w,height:h,fill:'#56b0ff',rx:2});
      if(q.chartType==='barClick'){
        bar.style.cursor='pointer';
        bar.addEventListener('click',()=>handleClick(i===d.maxIdx,bar));
      }
      svg.appendChild(bar);
      const t=el('text',{x:xs[i]+w/2,y:164,'text-anchor':'middle',fill:'#9ab0d0','font-size':9});
      t.textContent=d.labels[i]; svg.appendChild(t);
    });
    if(d.yticks){
      d.yticks.forEach(v=>{
        const y=150-(v/ymax)*126;
        const t=el('text',{x:24,y:y+3,'text-anchor':'end',fill:'#9ab0d0','font-size':8});
        t.textContent=v; svg.appendChild(t);
      });
    }
  }
  else if(q.chartType==='barTrunc'){
    drawAxes();
    const n=d.values.length;
    const {w,xs}=barGeom(n,{x0:40,gap:15});
    const range=d.ymax-d.ymin;
    d.values.forEach((v,i)=>{
      const h=((v-d.ymin)/range)*126;
      svg.appendChild(el('rect',{x:xs[i],y:150-h,width:w,height:h,fill:'#56b0ff',rx:2}));
      const t=el('text',{x:xs[i]+w/2,y:164,'text-anchor':'middle',fill:'#9ab0d0','font-size':9});
      t.textContent=d.labels[i]; svg.appendChild(t);
    });
    const t2=el('text',{x:24,y:24,'text-anchor':'end',fill:'#ffce5a','font-size':8});
    t2.textContent=d.ymin+'~'; svg.appendChild(t2);
  }
  else if(q.chartType==='box' || q.chartType==='boxOutlier'){
    drawAxes();
    const y=90;
    svg.appendChild(el('line',{x1:d.whiskerMin,y1:y,x2:d.whiskerMax,y2:y,stroke:'#9ab0d0','stroke-width':1.5}));
    svg.appendChild(el('line',{x1:d.whiskerMin,y1:y-10,x2:d.whiskerMin,y2:y+10,stroke:'#9ab0d0','stroke-width':1.5}));
    svg.appendChild(el('line',{x1:d.whiskerMax,y1:y-10,x2:d.whiskerMax,y2:y+10,stroke:'#9ab0d0','stroke-width':1.5}));
    svg.appendChild(el('rect',{x:d.boxMin,y:y-20,width:d.boxMax-d.boxMin,height:40,fill:'rgba(86,176,255,.25)',stroke:'#56b0ff','stroke-width':1.5}));
    svg.appendChild(el('line',{x1:d.median,y1:y-20,x2:d.median,y2:y+20,stroke:'#ffce5a','stroke-width':2}));
    if(q.chartType==='boxOutlier'){
      svg.appendChild(el('circle',{cx:d.outlier[0],cy:d.outlier[1],r:4.5,fill:'#ff6b7a'}));
    }
  }
  else if(q.chartType==='scatter' || q.chartType==='scatterClick'){
    drawAxes();
    d.points.forEach((p,i)=>{
      const c=el('circle',{cx:p[0],cy:p[1],r:4,fill:'#56b0ff',stroke:'#cde6ff','stroke-width':0.7});
      if(q.chartType==='scatterClick'){
        c.style.cursor='pointer';
        c.addEventListener('click',()=>handleClick(i===d.outlierIdx,c));
      }
      svg.appendChild(c);
    });
  }
  else if(q.chartType==='scatterCurve'){
    drawAxes();
    const pts=[];
    for(let x=40;x<=260;x+=20){
      const t=(x-150)/60;
      const y=140-100*Math.exp(-t*t/2);
      pts.push([x,y]);
    }
    pts.forEach(p=>svg.appendChild(el('circle',{cx:p[0],cy:p[1],r:4,fill:'#56b0ff','stroke-width':0})));
  }
  else if(q.chartType==='scatterCluster'){
    drawAxes();
    const cluster=[[60,120],[70,125],[80,118],[90,122],[100,115],[110,120],[75,110],[95,128],[65,115],[85,112]];
    cluster.forEach(p=>svg.appendChild(el('circle',{cx:p[0],cy:p[1],r:4,fill:'#56b0ff','stroke-width':0})));
    svg.appendChild(el('circle',{cx:230,cy:40,r:4.5,fill:'#ff6b7a'}));
    svg.appendChild(el('circle',{cx:255,cy:150,r:4.5,fill:'#ff6b7a'}));
  }
}

function renderQuestion(){
  answered=false;
  const q=QUESTIONS[idx];
  badge.textContent=(idx+1)+" / 12";
  fill.style.width=((idx)/12*100)+"%";
  levelEl.textContent=q.levelLabel;
  qtextEl.textContent=q.q;
  fbEl.className="fb";
  fbEl.textContent="";
  nextBtn.className="next";
  renderChart(q);

  if(q.opts){
    hintEl.style.display='none';
    optsEl.style.display='flex';
    optsEl.innerHTML="";
    q.opts.forEach((label,i)=>{
      const b=document.createElement('button');
      b.className='opt';
      b.textContent=label;
      b.addEventListener('click',()=>selectOption(i,b));
      optsEl.appendChild(b);
    });
  } else {
    optsEl.style.display='none';
    optsEl.innerHTML="";
    hintEl.style.display='block';
    hintEl.textContent=q.hint||"";
  }
}

function selectOption(i,btn){
  if(answered) return;
  answered=true;
  const q=QUESTIONS[idx];
  const correct = i===q.correct;
  const buttons=[...optsEl.children];
  buttons.forEach((b,j)=>{
    b.disabled=true;
    if(j===q.correct) b.classList.add('ok');
    else if(j===i) b.classList.add('no');
    else b.classList.add('dim');
  });
  finishAnswer(correct);
}

function handleClick(correct,shapeEl){
  if(answered) return;
  answered=true;
  const q=QUESTIONS[idx];
  shapeEl.setAttribute('stroke', correct?'#2ee6a6':'#ff6b7a');
  shapeEl.setAttribute('stroke-width',3);
  // reveal correct target too if wrong
  if(!correct){
    const shapes=[...svg.querySelectorAll('rect,circle')];
    const d=q.data;
    const correctIdx = d.maxIdx!==undefined ? d.maxIdx : d.outlierIdx;
    const bars=[...svg.querySelectorAll('rect')];
    const circles=[...svg.querySelectorAll('circle')];
    if(q.chartType==='scatterClick' && circles[correctIdx]){
      circles[correctIdx].setAttribute('stroke','#2ee6a6');
      circles[correctIdx].setAttribute('stroke-width',3);
    } else if(bars[correctIdx]){
      bars[correctIdx].setAttribute('stroke','#2ee6a6');
      bars[correctIdx].setAttribute('stroke-width',3);
    }
  }
  finishAnswer(correct);
}

function finishAnswer(correct){
  const q=QUESTIONS[idx];
  fbEl.classList.add('show');
  if(correct){
    score++;
    fbEl.classList.add('ok');
    fbEl.textContent="✅ "+q.fbOk;
  } else {
    fbEl.classList.add('no');
    fbEl.textContent="❌ "+q.fbNo;
    wrongList.push({q:q.q, explain:q.fbOk});
  }
  nextBtn.classList.add('show');
  nextBtn.textContent = idx===QUESTIONS.length-1 ? "결과 보기" : "다음 ▶";
}

nextBtn.addEventListener('click',()=>{
  if(idx===QUESTIONS.length-1){
    showResult();
  } else {
    idx++;
    renderQuestion();
  }
});

function showResult(){
  quizArea.style.display='none';
  resultArea.classList.add('show');
  fill.style.width='100%';
  document.getElementById('scoreText').textContent=score+" / 12";
  const note=document.getElementById('noteArea');
  if(score===12){
    note.innerHTML='<h3 class="perfect">🎉 만점! 그래프 읽기 완벽합니다.</h3>';
  } else {
    let html='<h3>📒 오답노트</h3><ul>';
    wrongList.forEach(w=>{
      html+=`<li><b>${w.q}</b><br>→ ${w.explain}</li>`;
    });
