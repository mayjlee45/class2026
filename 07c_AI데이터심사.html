<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 학습 데이터 심사 · 7차시</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{--bg:#0d1430;--panel:#172150;--ink:#eaf1ff;--sub:#9fb0e0;--line:#2a3568;--ok:#2ee6a6;--no:#ff6b7a;--warn:#f7b733;--accent:#7c9bff;}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#1c2a63,#0a0f24 70%);
    color:var(--ink);font-family:"Pretendard","Malgun Gothic","맑은 고딕",system-ui,sans-serif;
    display:flex;justify-content:center;padding:18px 14px 40px}
  .wrap{width:100%;max-width:600px}
  .tag{display:inline-block;font-size:13px;font-weight:700;color:var(--accent);background:rgba(124,155,255,.14);
    border:1px solid rgba(124,155,255,.4);padding:5px 12px;border-radius:999px;margin-bottom:10px}
  h1{font-size:22px;margin:0 0 6px}
  .lead{font-size:14px;color:var(--sub);line-height:1.6;margin-bottom:6px}
  .lead b{color:#fff}
  .prog{font-size:13px;color:var(--sub);margin-bottom:12px;font-weight:700}
  .card{background:var(--panel);border:2px solid var(--line);border-radius:18px;padding:24px;margin-bottom:14px;min-height:120px;
    display:flex;align-items:center;text-align:center}
  .card .q{font-size:18px;font-weight:700;line-height:1.5;width:100%}
  .btns{display:flex;gap:10px}
  .btns button{flex:1;border:2px solid;border-radius:14px;padding:13px 6px;font-size:14.5px;font-weight:800;cursor:pointer;
    background:#141d3e;font-family:inherit;line-height:1.3}
  .bok{border-color:var(--ok);color:var(--ok)}
  .bfix{border-color:var(--warn);color:var(--warn)}
  .bbad{border-color:var(--no);color:var(--no)}
  .btns button:active{transform:scale(.97)}
  .fb{display:none;margin-top:12px;padding:13px 15px;border-radius:12px;font-size:14px;line-height:1.55}
  .fb.show{display:block}
  .fb.ok{background:rgba(46,230,166,.12);border:1px solid var(--ok)}
  .fb.no{background:rgba(255,107,122,.12);border:1px solid var(--no)}
  .fb b{color:#fff}
  .next{display:none;margin-top:12px;width:100%;background:linear-gradient(90deg,#7c9bff,#2ee6a6);color:#06122a;font-weight:800;
    font-size:15px;border:none;border-radius:12px;padding:12px;cursor:pointer}
  .next.show{display:block}
  .result{display:none;background:linear-gradient(180deg,#15306a,#0e1f4a);border:1px solid var(--accent);border-radius:16px;padding:22px;text-align:center}
  .result.show{display:block}
  .result .sc{font-size:40px;font-weight:900;color:var(--ok);margin:6px 0}
  .result p{font-size:14.5px;color:#dde7ff;line-height:1.6}
  .again{margin-top:10px;background:none;border:1px solid var(--line);color:var(--sub);border-radius:11px;padding:10px 22px;cursor:pointer;font-weight:700}
</style>
</head>
<body>
<div class="wrap">
  <span class="tag">🔍 AI 학습 데이터 심사관</span>
  <h1>이 데이터, AI에게 먹여도 될까?</h1>
  <p class="lead">데이터셋을 보고 <b>AI 학습에 쓸 수 있는지</b> 판정하세요. (형태가 아니라 <b>균형·라벨·맥락</b> 기준)</p>
  <div class="prog">문항 <b id="idx">1</b> / <span id="tot">6</span> · 점수 <b id="score">0</b></div>

  <div class="card" id="card"><div class="q" id="q"></div></div>
  <div class="btns">
    <button class="bok" data-a="ok">✅ 학습 OK</button>
    <button class="bfix" data-a="fix">🔧 보완 필요</button>
    <button class="bbad" data-a="bad">❌ 부적합</button>
  </div>
  <div class="fb" id="fb"></div>
  <button class="next" id="next">다음 ▶</button>

  <div class="result" id="result">
    <p>심사 정확도</p>
    <div class="sc" id="sc"></div>
    <p id="rmsg"></p>
    <button class="again" id="again">다시 하기 ↻</button>
  </div>
</div>

<script>
(function(){
  const Q = [
    {
      q: "정상/이상 장비 사진이 골고루 있고, 라벨('정상'/'이상')도 정확합니다.",
      a: "ok",
      why: "균형·라벨이 모두 충족 → 바로 학습에 쓸 수 있습니다."
    },
    {
      q: "다양한 상황을 골고루 담았고 라벨·출처도 명확합니다.",
      a: "ok",
      why: "균형·라벨·맥락이 모두 좋아 학습에 이상적입니다."
    },
    {
      q: "정상 사진은 1만 장인데, 이상 사진은 0장입니다.",
      a: "fix",
      why: "한쪽으로 치우쳤지만(편향) 버릴 데이터가 아닙니다 — '이상' 사진을 더 모아 균형을 맞추면 됩니다."
    },
    {
      q: "사진은 많은데 '정상/이상' 라벨이 하나도 없습니다.",
      a: "fix",
      why: "지도학습엔 라벨이 필수입니다. 라벨링만 보완하면 그대로 쓸 수 있습니다."
    },
    {
      q: "라벨이 실제와 반대로 붙어 있습니다 ('정상'인데 '이상'으로 표기 등).",
      a: "bad",
      why: "정답(라벨)이 틀리면 AI가 거꾸로 배웁니다. 양으로도 못 고치니, 라벨을 신뢰할 수 없으면 그대로는 못 씁니다."
    },
    {
      q: "출처·항목 정의가 불명확해 무슨 데이터인지 알 수 없습니다.",
      a: "bad",
      why: "맥락(메타데이터)이 없어 신뢰·해석이 불가합니다."
    },
  ];

  // 문항 셔플
  (function(a){
    for(let i=a.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [a[i],a[j]]=[a[j],a[i]];
    }
  })(Q);

  document.getElementById('tot').textContent = Q.length;

  const NAME = {ok:"✅ 학습 OK", fix:"🔧 보완 필요", bad:"❌ 부적합"};
  const $ = id => document.getElementById(id);
  let i=0, score=0, busy=false;

  function render(){
    busy = false;
    $('idx').textContent = i+1;
    $('q').textContent = Q[i].q;
    $('fb').className = 'fb';
    $('fb').innerHTML = '';
    $('next').className = 'next';
    document.querySelectorAll('.btns button').forEach(b => b.disabled = false);
  }

  function pick(a){
    if(busy) return;
    busy = true;
    const d = Q[i];
    const ok = (a === d.a);
    if(ok) score++;
    $('score').textContent = score;
    document.querySelectorAll('.btns button').forEach(b => b.disabled = true);
    const fb = $('fb');
    fb.className = 'fb show ' + (ok ? 'ok' : 'no');
    fb.innerHTML = (ok ? '✅ 정확합니다! ' : `다시 보면 — 정답은 <b>${NAME[d.a]}</b>. `) + d.why;
    $('next').textContent = i < Q.length-1 ? '다음 ▶' : '결과 보기';
    $('next').className = 'next show';
  }

  document.querySelectorAll('.btns button').forEach(b => b.addEventListener('click', () => pick(b.dataset.a)));

  $('next').onclick = () => {
    if(i < Q.length-1){ i++; render(); }
    else finish();
  };

  function finish(){
    document.querySelector('.btns').style.display = 'none';
    $('fb').style.display = 'none';
    $('next').style.display = 'none';
    $('card').style.display = 'none';
    $('result').classList.add('show');
    $('sc').textContent = `${score} / ${Q.length}`;
    $('rmsg').textContent =
      score === Q.length
        ? "완벽한 심사관! 균형·라벨·맥락을 정확히 보셨어요."
        : score >= 4
          ? "좋아요! 편향·라벨·맥락 기준이 잡혔습니다."
          : "괜찮아요 — 핵심은 '형태'가 아니라 균형·라벨·맥락이라는 점!";
  }

  $('again').onclick = () => {
    i=0; score=0; $('score').textContent='0';
    $('result').classList.remove('show');
    document.querySelector('.btns').style.display = '';
    $('fb').style.display = '';
    $('card').style.display = '';
    render();
  };

  render();
})();
</script>
</body>
</html>
