<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 판단 게임 · 해도 될까, 믿어도 될까</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-user-select:none;user-select:none}
  :root{--ink:#eaf2ff;--sub:#9bb0c8;--panel:#172131;--line:#2a3a4f;--ok:#2ee6a6;--no:#ff6b7a;--accent:#56b0ff;--warn:#ffb454;}
  body{margin:0;min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#1a2940,#0a0f17 70%);
    color:var(--ink);font-family:"Pretendard","맑은 고딕",system-ui,sans-serif;display:flex;justify-content:center;padding:18px 14px 44px}
  .wrap{width:100%;max-width:560px}
  .top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .top h1{font-size:17px;margin-right:auto}
  .badge{background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px 11px;font-size:12.5px;font-weight:800;color:var(--warn)}
  .bar{height:7px;background:#101a28;border-radius:99px;overflow:hidden;margin-bottom:14px}
  .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,#ffb454,#56b0ff);transition:width .3s}
  .lv{display:inline-block;font-size:11.5px;font-weight:800;color:#04162a;background:var(--warn);border-radius:6px;padding:3px 9px;margin-bottom:9px}
  .lv.v2{background:var(--accent)} .lv.v3{background:#ff8db0}
  .scn{font-size:15.5px;font-weight:700;line-height:1.5;margin-bottom:12px}
  .scn .ctx{display:block;font-size:12.5px;color:var(--sub);font-weight:500;margin-bottom:5px}
  .opts{display:flex;flex-direction:column;gap:8px}
  .opt{text-align:left;background:#101c2c;border:1.5px solid var(--line);border-radius:11px;padding:12px 14px;font-size:14.5px;color:var(--ink);cursor:pointer;font-family:inherit}
  .opt:hover{border-color:var(--accent)} .opt.ok{border-color:var(--ok);background:rgba(46,230,166,.13)} .opt.no{border-color:var(--no);background:rgba(255,107,122,.13)} .opt.dim{opacity:.45}
  .fb{display:none;margin-top:12px;font-size:13.5px;line-height:1.6;color:#cfe0ff;background:#101c2c;border-left:3px solid var(--warn);border-radius:8px;padding:11px 13px} .fb.show{display:block} .fb b{color:#fff}
  .next{display:none;margin-top:12px;width:100%;background:linear-gradient(90deg,#ffb454,#56b0ff);color:#04162a;font-weight:800;font-size:15px;border:none;border-radius:11px;padding:12px;cursor:pointer} .next.show{display:block}
  .result{display:none;text-align:center;background:linear-gradient(180deg,#16273f,#0d1828);border:1px solid var(--accent);border-radius:16px;padding:22px}
  .result.show{display:block} .result .sc{font-size:33px;font-weight:900;color:var(--ok)}
  .note{margin-top:14px;text-align:left;background:#101c2c;border:1px solid var(--line);border-radius:12px;padding:14px}
  .note h3{font-size:13px;color:var(--warn);margin-bottom:8px} .note div{font-size:12.5px;color:#cfe0ff;line-height:1.55;padding:7px 0;border-top:1px solid #1d2c40} .note b{color:#fff}
  .again{margin-top:14px;background:none;border:1px solid var(--line);color:var(--sub);border-radius:11px;padding:10px 22px;cursor:pointer;font-weight:700}
  .intro{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;font-size:14px;line-height:1.6;color:#cfe0ff}
  .intro b{color:#fff}
  .start{margin-top:13px;width:100%;background:var(--warn);color:#23150a;font-weight:800;border:none;border-radius:11px;padding:12px;font-size:15px;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><h1>🧭 AI 판단 게임</h1><span class="badge" id="badge">시작</span></div>
  <div id="introBox">
    <div class="intro"><b>"이거, AI에게 해도 될까? 믿어도 될까?"</b><br><br>현장 상황을 보고 가장 안전·올바른 판단을 고르세요. ① 환각 간파 ② 편향 인식 ③ 보안 — 3단계. 틀린 건 오답노트로 모아줍니다.</div>
    <button class="start" id="start">시작 ▶</button>
  </div>
  <div id="game" style="display:none">
    <div class="bar"><span id="prog"></span></div>
    <span class="lv" id="lv"></span>
    <div class="scn" id="scn"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="next">다음 ▶</button>
  </div>
  <div class="result" id="result">
    <p>점수</p><div class="sc" id="sc"></div>
    <p style="font-size:13.5px;color:#cfe0ff;margin-top:8px">기억하세요: <b>AI는 '모른다'가 없어 지어내고, 배운 대로 치우치며, 입력은 밖으로 나갑니다. 최종 책임은 사람.</b></p>
    <div class="note" id="noteWrap"><h3>📒 오답노트</h3><div id="notes"></div></div>
    <button class="again" id="again">다시 풀기 ↻</button>
  </div>
</div>
<script>
(function(){
  const Q=[
    {lv:1,t:'환각 간파',ctx:"AI가 규정을 묻자 “제27조의5에 따르면…”이라며 조항을 인용했습니다.",q:"어떻게 할까요?",
     o:["조항 번호가 있으니 그대로 보고서에 인용","원문 문서에서 그 조항이 실제 있는지 직접 확인","AI에게 한 번 더 물어보고 같으면 채택"],a:1,
     w:"AI는 <b>존재하지 않는 조항·출처를 지어내기도</b> 합니다. 번호가 있다고 진짜가 아니에요 — 원문에서 직접 확인."},
    {lv:1,t:'환각 간파',ctx:"AI가 “관련 통계는 이렇습니다”라며 수치와 함께 URL 출처를 달아줬습니다.",q:"옳은 행동은?",
     o:["URL이 있으니 신뢰","링크를 직접 클릭해 존재·내용 일치를 확인","수치만 쓰고 출처는 생략"],a:1,
     w:"AI는 <b>그럴듯한 가짜 URL</b>을 만들기도 합니다. 클릭해서 실제로 있는지, 내용이 맞는지 확인하세요."},
    {lv:1,t:'환각 간파',ctx:"AI에게 큰 수의 곱셈·합계를 시켰더니 표로 깔끔히 답했습니다.",q:"어떻게?",
     o:["깔끔하니 맞을 것","엑셀·계산기로 재점검","틀릴 리 없으니 그대로"],a:1,
     w:"AI는 <b>계산도 틀립니다.</b> 수식 계산은 엑셀·계산기 같은 기계식 도구로 반드시 재점검."},
    {lv:2,t:'편향 인식',ctx:"AI가 “야간 정비는 보통 부실한 편입니다”라고 일반화해 말했습니다.",q:"어떻게 받아들일까요?",
     o:["경험 많은 AI니 맞을 것","학습 데이터의 편향일 수 있으니 우리 데이터로 확인","무조건 틀렸다고 무시"],a:1,
     w:"AI는 <b>배운 데이터의 치우침</b>을 그대로 내놓습니다. 일반화는 우리 실제 데이터로 검증해야 합니다."},
    {lv:2,t:'편향 인식',ctx:"인사·평가에 쓸 추천을 AI가 제시했습니다.",q:"채택은?",
     o:["AI가 객관적이니 그대로 적용","편향·공정성 위험이 크니 근거를 사람이 판단","점수가 높은 쪽을 자동 채택"],a:1,
     w:"사람에 대한 판단일수록 <b>편향이 치명적</b>입니다. AI는 제안, 타당성·공정성 판단은 사람이."},
    {lv:2,t:'편향 인식',ctx:"AI 답이 너무 자연스럽고 '중립적'으로 보입니다.",q:"맞는 생각은?",
     o:["중립적으로 보이면 편향 없음","겉보기 중립이어도 학습 데이터 패턴이 반영됨","말투가 정중하면 신뢰"],a:1,
     w:"<b>중립적으로 보여도</b> 사실은 배운 데이터의 패턴입니다. 보이는 톤과 실제 편향은 별개."},
    {lv:3,t:'보안',ctx:"실제 부대명·장비ID·담당자 이름이 든 정비일지를 그대로 무료 AI에 붙여넣어 분석하려 합니다.",q:"해도 될까요?",
     o:["분석 목적이면 괜찮다","금지 — 입력은 외부로 전송됨. 가공·익명화한 공용 데이터만","부대명만 지우면 OK"],a:1,
     w:"프롬프트 입력 = <b>외부 서버로 전송</b>. 실데이터·군사정보는 절대 금지, 가공 데이터만 사용."},
    {lv:3,t:'보안',ctx:"'대외비' 문서를 요약하려고 무료 AI에 통째로 올리려 합니다.",q:"옳은 판단은?",
     o:["요약만 받을 거니 괜찮다","대외비는 입력 금지 — 공개 가능한 발췌·가공본만","로그아웃하고 쓰면 됨"],a:1,
     w:"보안등급 있는 문서는 <b>입력 자체가 유출</b>입니다. 공개 가능한 내용만, 또는 폐쇄망 전용 도구로."},
    {lv:3,t:'보안',ctx:"AI가 “정확하려면 실제 데이터를 주세요”라고 요청합니다.",q:"어떻게?",
     o:["정확도를 위해 실데이터 제공","요청해도 실데이터는 금지 — 상황을 '설명'으로 대신 전달","민감한 부분만 빼고 제공"],a:1,
     w:"AI가 요청해도 <b>실데이터는 주지 않습니다.</b> 데이터 대신 '상황·구조'를 설명하면 방법을 알려줍니다(18차시)."}
  ];
  const $=id=>document.getElementById(id); let i=0,score=0,busy=false,wrong=[],curOpts=[];
  function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
  $('start').onclick=()=>{ $('introBox').style.display='none'; $('game').style.display=''; show(); };
  function show(){ busy=false; const q=Q[i]; $('badge').textContent=(i+1)+' / '+Q.length; $('prog').style.width=(i/Q.length*100)+'%';
    const lv=$('lv'); lv.className='lv v'+q.lv; lv.textContent=q.lv+'단계 · '+q.t;
    $('scn').innerHTML='<span class="ctx">상황 — '+q.ctx+'</span>'+q.q;
    curOpts=shuffle(q.o.map((t,k)=>({t,ok:k===q.a})));
    const ow=$('opts'); ow.innerHTML=''; curOpts.forEach((o,k)=>{const b=document.createElement('button'); b.className='opt'; b.textContent=o.t; b.onclick=()=>pick(k,b); ow.appendChild(b);});
    $('fb').className='fb'; $('next').className='next'; }
  function pick(k,btn){ if(busy)return; busy=true; const q=Q[i],ok=curOpts[k].ok; if(ok)score++; else wrong.push(q);
    [...$('opts').children].forEach((b,j)=>{b.disabled=true; if(curOpts[j].ok)b.classList.add('ok'); else if(j===k)b.classList.add('no'); else b.classList.add('dim');});
    $('fb').className='fb show'; $('fb').innerHTML=(ok?'✅ 정답! ':'❌ ')+q.w; $('next').textContent=i<Q.length-1?'다음 ▶':'결과 보기'; $('next').className='next show'; }
  $('next').onclick=()=>{ if(i<Q.length-1){i++;show();} else finish(); };
  function finish(){ $('game').style.display='none'; $('badge').textContent='완료'; $('prog').style.width='100%';
    $('result').classList.add('show'); $('sc').textContent=score+' / '+Q.length;
    if(wrong.length){ $('notes').innerHTML=wrong.map(w=>'<div><b>'+w.t+'</b> — '+w.ctx+'<br>→ '+w.w+'</div>').join(''); }
    else { $('noteWrap').innerHTML='<h3 style="color:#2ee6a6">🎉 만점! 환각·편향·보안 판단이 탄탄합니다.</h3>'; } }
  $('again').onclick=()=>{ i=0;score=0;wrong=[]; $('result').classList.remove('show'); $('noteWrap').innerHTML='<h3>📒 오답노트</h3><div id="notes"></div>'; $('game').style.display=''; show(); };
})();
</script>
</body>
</html>
