<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2일차 관통 복습 · 어떤 위젯·그래프를 쓸까</title>
<style>
:root{
  --ink:#eaf2ff; --sub:#9ab0d0; --panel:#19283f; --line:#2a426b;
  --ok:#2ee6a6; --no:#ff6b7a; --accent:#56b0ff; --gold:#ffce5a; --org:#ff9e4a;
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;}
body{
  min-height:100vh;
  background:radial-gradient(120% 90% at 50% 0%, #1c2f4f, #0a111e 70%);
  color:var(--ink);
  font-family:Pretendard,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
  display:flex; justify-content:center; padding:18px 14px 40px;
}
.wrap{width:100%; max-width:560px;}
.top{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
.top h1{font-size:17px; margin-right:auto;}
.badge{background:var(--panel); border:1px solid var(--line); border-radius:999px; padding:5px 11px; font-size:12.5px; font-weight:800; color:var(--gold);}
.bar{height:7px; background:#13243f; border-radius:99px; overflow:hidden; margin-bottom:14px;}
.bar>span{display:block; height:100%; width:0; background:linear-gradient(90deg,#ff9e4a,#56b0ff); transition:width .3s;}

.intro{background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px; font-size:13.5px; line-height:1.6; color:#cfe0ff;}
.intro b{color:#fff;}
.start{margin-top:14px; width:100%; background:var(--org); color:#22150a; font-weight:800; border:none; border-radius:11px; padding:12px; font-size:15px; cursor:pointer;}

.lv{display:inline-block; font-size:11.5px; font-weight:800; color:#04162a; background:var(--org); border-radius:6px; padding:3px 9px; margin-bottom:10px;}
.lv.v2{background:var(--accent);}
.lv.v3{background:var(--gold);}

.scn{font-size:12.5px; color:var(--sub); margin-bottom:4px;}
.q{font-size:16.5px; font-weight:700; line-height:1.5; margin-bottom:13px;}

.opts{display:flex; flex-direction:column; gap:8px;}
.opt{text-align:left; background:#11203a; border:1.5px solid var(--line); border-radius:10px; padding:12px 14px; font-size:14.5px; color:var(--ink); cursor:pointer; font-family:inherit; width:100%;}
.opt code{background:#0c1a30; color:#9fd0ff; padding:1px 6px; border-radius:5px; font-size:13px;}
.opt:hover{border-color:var(--accent);}
.opt.ok{border-color:var(--ok); background:rgba(46,230,166,.13);}
.opt.no{border-color:var(--no); background:rgba(255,107,122,.13);}
.opt.dim{opacity:.45;}

.fb{display:none; margin-top:12px; font-size:13.5px; line-height:1.6; color:#cfe0ff; background:#11203a; border-left:3px solid var(--gold); border-radius:8px; padding:11px 13px;}
.fb.show{display:block;}
.fb b{color:#fff;}

.next{display:none; margin-top:12px; width:100%; background:linear-gradient(90deg,#ff9e4a,#56b0ff); color:#04162a; font-weight:800; font-size:15px; border:none; border-radius:11px; padding:12px; cursor:pointer;}
.next.show{display:block;}

.result{display:none; text-align:center; background:linear-gradient(#16335a,#0e1f3a); border:1px solid var(--accent); border-radius:16px; padding:22px;}
.result.show{display:block;}
.result .sc{font-size:34px; font-weight:900; color:var(--ok);}

.note{margin-top:16px; text-align:left; background:#11203a; border:1px solid var(--line); border-radius:12px; padding:14px;}
.note h3{font-size:13px; color:var(--gold); margin-bottom:8px;}
.note h3.perfect{text-align:center;}
.note div{font-size:12.5px; color:#cfe0ff; line-height:1.55; padding:7px 0; border-top:1px solid #1d3252;}
.note div:first-of-type{border-top:none;}
.note b{color:#fff;}
.note span{color:var(--sub);}

.again{margin-top:14px; background:none; border:1px solid var(--line); color:var(--sub); border-radius:11px; padding:10px 22px; cursor:pointer; font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <h1>🍊 2일차 관통 복습</h1>
    <span class="badge" id="badge">1 / 12</span>
  </div>
  <div class="bar"><span id="prog"></span></div>

  <div id="introBox">
    <div class="intro">
      <b>전처리(11차시) + 시각화·분석(12차시)</b>을 한 번에 복습합니다.<br><br>
      상황을 읽고 <b>어떤 Orange 위젯·그래프를 쓸지</b> 고르세요. 3단계 — ① 전처리 위젯 ② 시각화 선택 ③ 종합 판단. 틀린 건 마지막에 오답노트로 모아줍니다.
    </div>
    <button class="start" id="start">시작 ▶</button>
  </div>

  <div id="game" style="display:none;">
    <span class="lv" id="lv"></span>
    <div class="scn" id="scn"></div>
    <div class="q" id="q"></div>
    <div class="opts" id="opts"></div>
    <div class="fb" id="fb"></div>
    <button class="next" id="next"></button>
  </div>

  <div class="result" id="result">
    <p>점수</p>
    <div class="sc" id="sc">0 / 12</div>
    <div class="note" id="noteWrap"></div>
    <button class="again" id="again">다시 풀기 ↻</button>
  </div>
</div>

<script>
const LEVEL_NAMES = {1:"전처리 위젯", 2:"시각화 선택", 3:"종합 판단"};

const QUESTIONS = [
{level:1, scn:"정비일지 — 담당자·정비결과 칸이 군데군데 비어 있음(결측).", q:"빈 칸을 채우려면?",
 opts:["<code>Preprocess</code> 전처리 → Impute 결측 대체","<code>Select Rows</code> 행 거르기","<code>Distributions</code> 분포·빈도"],
 correct:0, fb:"결측값 대체는 Preprocess의 <b>Impute</b>. 평균·최빈값 등으로 빈 칸을 채웁니다."},

{level:1, scn:"소요시간에 −30, 9999 같은 말도 안 되는 값이 섞임.", q:"이 이상값을 걸러내려면?",
 opts:["<code>Continuize</code> 범주→수치","<code>Select Rows</code> 행 거르기(조건 필터)","<code>Box Plot</code> 상자그림(이상값 보기)"],
 correct:1, fb:"<b>Select Rows</b>로 '소요시간&lt;0 또는 =9999' 조건을 만들어 제외. (Box Plot은 '보는' 도구지 거르는 도구가 아님)"},

{level:1, scn:"같은 장비가 '무전기'와 '무선기' 두 이름으로 들어가 있음.", q:"표기를 하나로 통일하려면?",
 opts:["<code>Apply/Edit Domain</code> 값 정의·이름 바꾸기","<code>Merge Data</code> 표 합치기","<code>Impute</code> 결측 대체"],
 correct:0, fb:"값 이름 통일·재정의는 <b>Apply(Edit) Domain</b>. (Merge는 표를 합치는 것)"},

{level:1, scn:"부품교체여부가 Y / N 글자로 되어 있어 평균 계산이 안 됨.", q:"숫자(1/0)로 바꾸려면?",
 opts:["<code>Discretize</code> 수치→구간","<code>Continuize</code> 범주→수치","<code>Transpose</code> 행↔열 전환"],
 correct:1, fb:"범주(Y/N)를 숫자(1/0)로 바꾸는 건 <b>Continuize</b>. (Discretize는 반대로 수치를 구간으로)"},

{level:2, scn:"어느 장비에 고장이 가장 많이 몰리는지 보고 싶음.", q:"어떤 그래프?",
 opts:["<code>Scatter Plot</code> 산점도(두 변수 관계)","<code>Distributions</code> 분포·빈도","<code>Correlations</code> 상관계수"],
 correct:1, fb:"한 변수의 분포·빈도는 <b>Distributions</b>. 막대 높이로 어디에 몰렸는지 한눈에."},

{level:2, scn:"소요시간에 유난히 튀는 값(이상값)이 있는지 확인.", q:"어떤 그래프?",
 opts:["<code>Box Plot</code> 상자그림(이상값)","<code>Bar Plot</code> 막대그래프","<code>Pivot Table</code> 그룹 요약표"],
 correct:0, fb:"중앙값·사분위·이상값을 한눈에 보는 <b>Box Plot</b>. 수염 밖 점이 이상값 신호."},

{level:2, scn:"소요시간과 다른 수치 변수의 '관계'를 보고 싶음.", q:"어떤 그래프?",
 opts:["<code>Distributions</code> 분포·빈도","<code>Scatter Plot</code> 산점도(두 변수 관계)","<code>Data Info</code> 데이터 요약(행·열·결측)"],
 correct:1, fb:"두 변수의 관계는 <b>Scatter Plot</b>(산점도). 점의 흐름으로 양/음/무관계를 봅니다."},

{level:2, scn:"'장비별 평균 소요시간' 같은 그룹 요약표가 필요.", q:"어떤 위젯?",
 opts:["<code>Pivot Table</code> 그룹 요약표","<code>Box Plot</code> 상자그림(이상값)","<code>Impute</code> 결측 대체"],
 correct:0, fb:"행·열·집계로 그룹 요약표를 만드는 <b>Pivot Table</b>. 행=장비명, 셀=소요시간 평균."},

{level:3, scn:"보고서에 '평균 소요시간'만 써서 올리려 함.", q:"옳은 태도는?",
 opts:["평균이면 충분","중앙값·분포도 함께 본다","최댓값만 본다"],
 correct:1, fb:"평균은 이상값·치우침에 약함(9차시). 중앙값·표준편차·분포를 함께 봐야 안 속습니다."},

{level:3, scn:"두 변수의 상관계수가 높게 나옴.", q:"결론으로 옳은 것은?",
 opts:["하나가 다른 하나의 원인이다","상관이 곧 인과는 아니다","우연이니 무시한다"],
 correct:1, fb:"상관 ≠ 인과. 교란변수(숨은 제3요인) 때문일 수 있음 — 데이터 분석 최대 실수."},

{level:3, scn:"전처리도 안 한 원본을 바로 그래프로 그렸더니 패턴이 안 보임.", q:"먼저 할 일은?",
 opts:["축을 더 늘린다","전처리(이상값·결측)부터","그래프를 포기한다"],
 correct:1, fb:"이상값 하나가 축을 늘려 패턴을 가립니다(10차시). 전처리가 시각화보다 먼저."},

{level:3, scn:"Orange 워크플로에서 작업 중. 원본 정비일지 파일은?", q:"어떻게 다뤄야 하나?",
 opts:["워크플로 사본에서만 작업, 원본은 보존","원본을 직접 덮어쓴다","매번 새로 받는다"],
 correct:0, fb:"원본은 절대 건드리지 않습니다. 모든 처리는 사본·워크플로에서 — 되돌릴 수 있어야 안전."}
];

let idx=0, score=0, answered=false, wrong=[];

const badge=document.getElementById('badge');
const prog=document.getElementById('prog');
const introBox=document.getElementById('introBox');
const game=document.getElementById('game');
const lv=document.getElementById('lv');
const scn=document.getElementById('scn');
const qEl=document.getElementById('q');
const opts=document.getElementById('opts');
const fb=document.getElementById('fb');
const next=document.getElementById('next');
const result=document.getElementById('result');
const sc=document.getElementById('sc');
const noteWrap=document.getElementById('noteWrap');

document.getElementById('start').addEventListener('click', ()=>{
  introBox.style.display='none';
  game.style.display='block';
  renderQ();
});

function renderQ(){
  answered=false;
  const cur=QUESTIONS[idx];
  badge.textContent=(idx+1)+" / 12";
  prog.style.width=(idx/12*100)+"%";
  lv.className='lv v'+cur.level;
  lv.textContent=cur.level+"단계 · "+LEVEL_NAMES[cur.level];
  scn.textContent="상황 — "+cur.scn;
  qEl.textContent=cur.q;
  fb.className='fb';
  fb.innerHTML='';
  next.className='next';
  next.textContent = idx===QUESTIONS.length-1 ? "결과 보기" : "다음 ▶";
  opts.innerHTML='';
  cur.opts.forEach((html,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=html;
    b.addEventListener('click',()=>selectOpt(i));
    opts.appendChild(b);
  });
}

function selectOpt(i){
  if(answered) return;
  answered=true;
  const cur=QUESTIONS[idx];
  const correct = i===cur.correct;
  [...opts.children].forEach((b,j)=>{
    if(j===cur.correct) b.classList.add('ok');
    else if(j===i) b.classList.add('no');
    else b.classList.add('dim');
  });
  fb.classList.add('show');
  fb.innerHTML = correct ? ("✅ 정답! "+cur.fb) : ("❌ "+cur.fb);
  if(correct) score++; else wrong.push(cur);
  next.classList.add('show');
}

next.addEventListener('click', ()=>{
  if(idx===QUESTIONS.length-1){
    showResult();
  } else {
    idx++;
    renderQ();
  }
});

function showResult(){
  game.style.display='none';
  result.classList.add('show');
  badge.textContent="완료";
  prog.style.width="100%";
  sc.textContent=score+" / 12";
  if(wrong.length===0){
    noteWrap.innerHTML='<h3 class="perfect">🎉 만점! 전처리부터 시각화·판단까지 완벽합니다.</h3>';
  } else {
    let html='<h3>📒 오답노트</h3>';
    wrong.forEach(w=>{
      html+=`<div><b>${w.q}</b> <span>(${w.scn})</span><br>→ ${w.fb}</div>`;
    });
    noteWrap.innerHTML=html;
  }
}

document.getElementById('again').addEventListener('click', ()=>{
  idx=0; score=0; wrong=[]; answered=false;
  result.classList.remove('show');
  game.style.display='block';
  renderQ();
});
</script>
</body>
</html>
