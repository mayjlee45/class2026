<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생명주기 매칭</title>
  <style>
    :root {
      --bg:#0f1720;--card:#172230;--line:#2a3a4d;--ink:#eaf1f8;
      --sub:#9fb2c6;--accent:#3d8bfd;--ok:#27ae60;--err:#e74c3c;--warn:#e67e22;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--ink);
      font-family:Pretendard,"Malgun Gothic","맑은 고딕",system-ui,sans-serif;
      min-height:100vh;padding:28px 14px;display:flex;justify-content:center;}
    .wrap{width:100%;max-width:680px;}
    .back{display:inline-block;margin-bottom:18px;font-size:13px;color:var(--sub);text-decoration:none;}
    .back:hover{color:var(--ink);}
    .tag{display:inline-block;font-size:12px;font-weight:700;color:var(--accent);
      background:rgba(61,139,253,.12);border:1px solid rgba(61,139,253,.3);
      padding:4px 11px;border-radius:999px;margin-bottom:10px;}
    h2{font-size:22px;margin-bottom:8px;}
    .lead{color:var(--sub);font-size:14.5px;line-height:1.65;margin-bottom:22px;}
    .card{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:18px 20px;margin-bottom:14px;}
    .card h3{font-size:15px;margin-bottom:10px;}
    .opts{display:grid;gap:8px;margin-top:10px;}
    .opts.g2{grid-template-columns:1fr 1fr;}
    .opts.g1{grid-template-columns:1fr;}
    .btn{padding:10px 14px;border-radius:10px;background:#1e3050;color:var(--ink);
      border:1px solid var(--line);font-size:14px;cursor:pointer;text-align:left;
      transition:background .15s,border-color .15s;}
    .btn:hover:not(:disabled){background:#253d63;border-color:var(--accent);}
    .btn:disabled{opacity:.55;cursor:default;}
    .btn.correct{background:rgba(39,174,96,.2)!important;border-color:var(--ok)!important;color:#6fe09f;}
    .btn.wrong{background:rgba(231,76,60,.15)!important;border-color:var(--err)!important;color:#f08080;}
    .fb{margin-top:10px;font-size:13.5px;padding:10px 14px;border-radius:10px;display:none;}
    .fb.ok{background:rgba(39,174,96,.12);color:#6fe09f;display:block;}
    .fb.err{background:rgba(231,76,60,.1);color:#f08080;display:block;}
    .progress{font-size:13px;color:var(--sub);margin-bottom:16px;}
    .score-box{background:var(--card);border:1px solid var(--line);border-radius:14px;
      padding:24px;text-align:center;margin-top:18px;display:none;}
    .score-box .big{font-size:48px;margin-bottom:8px;}
    .score-box p{color:var(--sub);font-size:14px;}
    .foot{text-align:center;font-size:12px;color:#4a5a6a;margin-top:36px;
      padding-top:14px;border-top:1px solid var(--line);}
    /* drag styles */
    .drag-item{padding:10px 14px;background:#1e3050;border:1px solid var(--line);
      border-radius:10px;cursor:grab;font-size:14px;user-select:none;transition:opacity .15s;}
    .drag-item:active{cursor:grabbing;opacity:.7;}
    .drag-item.dragging{opacity:.4;}
    .drop-zone{min-height:54px;background:rgba(61,139,253,.06);border:2px dashed var(--line);
      border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:6px;}
    .drop-zone.over{border-color:var(--accent);background:rgba(61,139,253,.12);}
    .zone-label{font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600;}

  </style>
</head>
<body>
<div class="wrap">
  <a class="back" href="index.html">← 목록으로</a>
  <div class="tag">🔗 3차시 매칭</div>
  <h2>데이터 생명주기 단계 매칭</h2>
  <p class="lead">단계를 클릭한 뒤 설명을 클릭해서 연결하세요. 6단계 모두 맞혀보세요!</p>

  <div class="card">
    <p style="font-size:14px;color:var(--sub);margin-bottom:14px">각 생명주기 단계와 올바른 설명을 연결하세요.</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;" id="match-grid">
      <div>
        <div class="zone-label">단계</div>
        <div id="stages" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>
      <div>
        <div class="zone-label">설명</div>
        <div id="descs" style="display:flex;flex-direction:column;gap:8px;"></div>
      </div>
    </div>
    <div id="match-fb" class="fb" style="margin-top:14px"></div>
    <button class="btn" style="margin-top:12px;width:100%;background:var(--accent);color:#fff" onclick="checkMatch()">정답 확인</button>
  </div>
  <script>
  var pairs=[
    {stage:"① 생성",desc:"처음 데이터가 만들어지는 순간 (정비하며 기록)"},
    {stage:"② 수집",desc:"필요한 데이터를 한곳에 모으는 과정 ⚠️급소"},
    {stage:"③ 저장",desc:"DB·파일서버에 안전하게 보관"},
    {stage:"④ 활용",desc:"분석·의사결정에 사용"},
    {stage:"⑤ 보존",desc:"규정 기간 동안 유지·관리"},
    {stage:"⑥ 폐기",desc:"수명이 다한 데이터를 완전 삭제 ⚠️급소"},
  ];
  var shuffled=[...pairs].sort(()=>Math.random()-0.5);
  var stageDiv=document.getElementById('stages');
  var descDiv=document.getElementById('descs');
  var selStage=null,selDesc=null;
  var matched={};
  pairs.forEach(function(p,i){
    var s=document.createElement('div');
    s.className='drag-item';s.textContent=p.stage;s.dataset.idx=i;s.style.cursor='pointer';
    s.onclick=function(){
      if(matched[i]) return;
      document.querySelectorAll('[data-role="stage"]').forEach(function(x){x.style.borderColor='var(--line)';});
      this.style.borderColor='var(--accent)';selStage=this;tryMatch();
    };
    s.dataset.role='stage';
    stageDiv.appendChild(s);
  });
  shuffled.forEach(function(p,j){
    var origIdx=pairs.indexOf(p);
    var d=document.createElement('div');
    d.className='drag-item';d.textContent=p.desc;d.dataset.idx=origIdx;d.style.cursor='pointer';
    d.dataset.role='desc';d.style.fontSize='13px';
    d.onclick=function(){
      if(matched[origIdx]) return;
      document.querySelectorAll('[data-role="desc"]').forEach(function(x){x.style.borderColor='var(--line)';});
      this.style.borderColor='var(--accent)';selDesc=this;tryMatch();
    };
    descDiv.appendChild(d);
  });
  function tryMatch(){
    if(!selStage||!selDesc) return;
    var si=parseInt(selStage.dataset.idx),di=parseInt(selDesc.dataset.idx);
    if(si===di){
      selStage.style.borderColor='var(--ok)';selStage.style.color='#6fe09f';matched[si]=true;
      selDesc.style.borderColor='var(--ok)';selDesc.style.color='#6fe09f';
    } else {
      selStage.style.background='rgba(231,76,60,.15)';
      selDesc.style.background='rgba(231,76,60,.15)';
      setTimeout(function(){
        selStage.style.background='';selDesc.style.background='';
        selStage.style.borderColor='var(--line)';selDesc.style.borderColor='var(--line)';
      },600);
    }
    selStage=null;selDesc=null;
    if(Object.keys(matched).length===pairs.length){
      var fb=document.getElementById('match-fb');
      fb.textContent='✅ 모두 연결했습니다! 생명주기 6단계의 급소는 ②수집과 ⑥폐기입니다.';
      fb.className='fb ok';
    }
  }
  function checkMatch(){
    var n=Object.keys(matched).length;
    var fb=document.getElementById('match-fb');
    fb.textContent=n+'/'+pairs.length+'개 연결됨. '+(n<pairs.length?'아직 연결 안 된 항목이 있습니다.':'모두 완료!');
    fb.className='fb '+(n===pairs.length?'ok':'err');
  }
  </script>

  <div class="foot">데이터 관리자 기본·실무 교육 · 3차시</div>
</div>

</body>
</html>
