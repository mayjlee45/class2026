<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워밍업 · 좋아하는 동물은?</title>
  <style>
    :root {
      --bg: #0f1720;
      --card: #172230;
      --line: #2a3a4d;
      --ink: #eaf1f8;
      --sub: #9fb2c6;
      --accent: #3d8bfd;
      --ok: #2ecc71;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Pretendard, "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 30px 14px;
      min-height: 100vh;
    }
    .wrap { width: 100%; max-width: 680px; text-align: center; }
    .tag {
      display: inline-block;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      background: rgba(61,139,253,0.12);
      border: 1px solid rgba(61,139,253,0.35);
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    h1 { font-size: 25px; margin: 0 0 6px; }
    .lead { color: var(--sub); font-size: 15.5px; line-height: 1.6; margin: 0 0 22px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 520px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    .animal {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 8px 12px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, background 0.15s;
    }
    .animal:hover { border-color: var(--accent); transform: translateY(-3px); }
    .animal.pick {
      border-color: var(--ok);
      background: rgb(22,52,31);
      transform: translateY(-3px) scale(1.03);
    }
    .animal .e { font-size: 40px; display: block; }
    .animal .n { font-size: 13.5px; color: var(--sub); margin-top: 6px; }
    .react {
      display: none;
      margin-top: 24px;
      background: linear-gradient(rgb(22,36,58), rgb(20,29,44));
      border: 1px solid var(--accent);
      border-radius: 16px;
      padding: 24px;
    }
    .react.show {
      display: block;
      animation: pop 0.35s ease;
    }
    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1); }
    }
    .react .big { font-size: 64px; }
    .react .msg { font-size: 18px; margin-top: 8px; font-weight: 600; }
    .react .tip { margin-top: 14px; font-size: 14.5px; color: var(--sub); line-height: 1.6; }
    .react .tip b { color: var(--ink); }
    .reset {
      margin-top: 16px;
      background: none;
      border: 1px solid var(--line);
      color: var(--sub);
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }
    .reset:hover { border-color: var(--accent); color: var(--ink); }
    .foot { margin-top: 22px; font-size: 13px; color: var(--sub); }
  </style>
</head>
<body>
<div class="wrap">
  <span class="tag">🐾 워밍업 · 도구 연습</span>
  <h1>좋아하는 동물을 하나 골라보세요</h1>
  <p class="lead">정답은 없습니다. 그냥 마음에 드는 걸 <b>클릭</b>해 보세요.<br>
     앞으로의 실습도 오늘처럼 <b>화면에서 클릭</b>하면 됩니다.</p>

  <div class="grid" id="grid">
    <div class="animal"><span class="e">🐶</span><span class="n">강아지</span></div>
    <div class="animal"><span class="e">🐱</span><span class="n">고양이</span></div>
    <div class="animal"><span class="e">🦁</span><span class="n">사자</span></div>
    <div class="animal"><span class="e">🐧</span><span class="n">펭귄</span></div>
    <div class="animal"><span class="e">🦅</span><span class="n">독수리</span></div>
    <div class="animal"><span class="e">🐯</span><span class="n">호랑이</span></div>
    <div class="animal"><span class="e">🐢</span><span class="n">거북이</span></div>
    <div class="animal"><span class="e">🦊</span><span class="n">여우</span></div>
  </div>

  <div class="react" id="react">
    <div class="big" id="bigE">🐶</div>
    <div class="msg" id="msg"></div>
    <div class="tip">방금처럼 <b>클릭 → 반응 확인</b>, 이게 전부입니다.
       이 도구로 잠시 뒤 데이터 퀴즈와 실습을 직접 해보겠습니다. 😊</div>
    <button class="reset" onclick="location.reload()">다시 고르기</button>
  </div>

  <div class="foot">데이터 관리자 기본·실무 교육 · 0차시 워밍업</div>
</div>

<script>
  const msgs = {
    '강아지': '강아지를 골랐군요! 충성스럽고 다정한 선택이에요 🐶',
    '고양이': '고양이네요! 독립적이고 신비로운 감성을 가졌군요 🐱',
    '사자': '사자! 용기 있고 리더십이 넘치는 선택이에요 🦁',
    '펭귄': '펭귄이라니! 귀엽고 사교적인 분이시군요 🐧',
    '독수리': '독수리! 높은 시야와 날카로운 통찰력의 상징이죠 🦅',
    '호랑이': '호랑이! 강인하고 열정적인 에너지가 느껴져요 🐯',
    '거북이': '거북이네요! 꾸준하고 지혜로운 선택이에요 🐢',
    '여우': '여우! 영리하고 재치 있는 분이시군요 🦊'
  };

  document.querySelectorAll('.animal').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.animal').forEach(c => c.classList.remove('pick'));
      card.classList.add('pick');
      const name = card.querySelector('.n').textContent;
      const emoji = card.querySelector('.e').textContent;
      document.getElementById('bigE').textContent = emoji;
      document.getElementById('msg').textContent = msgs[name] || name + '을(를) 골랐군요!';
      const react = document.getElementById('react');
      react.classList.remove('show');
      void react.offsetWidth;
      react.classList.add('show');
    });
  });
</script>
</body>
</html>
